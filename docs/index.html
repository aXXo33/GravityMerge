@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

@keyframes spinGlow{0%{transform:rotate(0deg);filter:hue-rotate(0deg)}100%{transform:rotate(360deg);filter:hue-rotate(360deg)}}

<script>
// ===== v5.1 MEGA BUILD: 10/10 RICOCHET LAB =====

// Emoji constants (safe for JS strings)
var E_COIN = String.fromCodePoint(0x1FA99);
var E_FIRE = String.fromCodePoint(0x1F525);
var E_STAR = String.fromCodePoint(0x2B50);
var E_STAR_EMPTY = '\u2606';
var E_PARTY = String.fromCodePoint(0x1F389);
var E_BOOM = String.fromCodePoint(0x1F4A5);
var E_LOCK = String.fromCodePoint(0x1F512);
var E_UNLOCK = String.fromCodePoint(0x1F513);
var E_SPARKLE = String.fromCodePoint(0x1F31F);
var E_DOT = '\u25CF';
var E_DOTOPEN = '\u25CB';
var E_CRY = String.fromCodePoint(0x1F629);
var E_ANGRY = String.fromCodePoint(0x1F624);
var E_SAD = String.fromCodePoint(0x1F614);
var E_RAGE = String.fromCodePoint(0x1F4A2);
var E_CHECK = '\u2705';
var E_TIMER = '\u23F3';
var E_GLOBE = String.fromCodePoint(0x1F310);
var E_BOMB = String.fromCodePoint(0x1F4A3);
var E_GEM = String.fromCodePoint(0x1F48E);
var E_SHIELD = String.fromCodePoint(0x1F6E1);
var E_ARROW = '\u27A1';
var E_GHOST = String.fromCodePoint(0x1F47B);
var E_CYCLONE = String.fromCodePoint(0x1F300);
var E_SKULL = String.fromCodePoint(0x1F480);
var E_GOLD1 = String.fromCodePoint(0x1F947);
var E_SILVER = String.fromCodePoint(0x1F948);
var E_BRONZE = String.fromCodePoint(0x1F949);
var E_TARGET = String.fromCodePoint(0x1F3AF);
var E_ROCKET = String.fromCodePoint(0x1F680);
var E_SCOPE = String.fromCodePoint(0x1F52C);
var E_SLOT = String.fromCodePoint(0x1F3B0);

const C = document.getElementById('gameCanvas');
const ctx = C.getContext('2d');
const CC = document.getElementById('confettiCanvas');
const cctx = CC.getContext('2d');

// ===== GLOBALS =====
let W, H, balls = [], targets = [], walls = [], particles = [], shockwaves = [], textPops = [];
let shooting = false, aiming = false, aimX, aimY, launchX, launchY;
let score = 0, combo = 0, maxCombo = 0, shotsLeft = 3, totalShots = 3, targetsLeft = 0, level = 1;
let currentRoom = 0, currentRoomLevel = 0, gameActive = false, isBossRoom = false;
let screenShake = 0, slowMo = 1, slowMoTimer = 0;
let confetti = [], trailParticles = [];
let replayFrames = [], isRecording = false;
let tutorialStep = -1, tutorialDone = false;
let coins = 0, equippedSkin = 'default', equippedTrail = 'none', equippedEffect = 'default';

// ===== SAVE SYSTEM =====
const SAVE_KEY = 'rl2_save';
let save = loadSave();

function loadSave(){
  try{
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(s){
      // Migration: ensure all new fields exist
      if(!s.ownedSkins) s.ownedSkins = ['default'];
      if(!s.ownedTrails) s.ownedTrails = ['none'];
      if(!s.ownedEffects) s.ownedEffects = ['default'];
      if(!s.achievements) s.achievements = [];
      if(!s.roomProgress || s.roomProgress.length < 6){
        s.roomProgress = [{unlocked:true,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]}];
      }
      // Ensure each room has proper structure
      for(var ri = 0; ri < 6; ri++){
        if(!s.roomProgress[ri]) s.roomProgress[ri] = {unlocked:ri===0,cleared:false,levels:[0,0,0,0,0]};
        if(!s.roomProgress[ri].levels) s.roomProgress[ri].levels = [0,0,0,0,0];
        if(s.roomProgress[ri].unlocked === undefined) s.roomProgress[ri].unlocked = (ri === 0);
      }
      if(!s.totalShots) s.totalShots = 0;
      if(!s.totalPerfects) s.totalPerfects = 0;
      if(!s.totalBosses) s.totalBosses = 0;
      if(!s.totalCombos) s.totalCombos = 0;
      if(!s.coins) s.coins = 0;
      return s;
    }
  }catch(e){}
  return {bestLevel:0,highScore:0,roomProgress:[{unlocked:true,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]},{unlocked:false,cleared:false,levels:[0,0,0,0,0]}],streak:0,lastPlay:'',coins:0,equippedSkin:'default',equippedTrail:'none',equippedEffect:'default',ownedSkins:['default'],ownedTrails:['none'],ownedEffects:['default'],achievements:[],dailySpinDate:'',tutorialDone:false,totalShots:0,totalPerfects:0,totalBosses:0,totalCombos:0};
}

function saveSave(){
  save.coins = coins;
  save.equippedSkin = equippedSkin;

// ===== AUDIO ENGINE =====
let audioCtx;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq,type,dur,vol){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime((vol||0.15),a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+dur);
  }catch(e){}
}

    save.lastPlay = today;
    saveSave();

function startRoomLevel(ri, li){
  currentRoom = ri;
  currentRoomLevel = li;
  isBossRoom = (li === 4);
  var room = ROOMS[ri];
  var globalLevel = ri * 5 + li + 1;
  level = globalLevel;
  generateLevel(room, li, globalLevel);
  hideAll();

  document.getElementById('hudRoom').textContent = room.name;
  gameActive = true;
  score = 0;
  combo = 0;
  maxCombo = 0;
  isRecording = true;
  replayFrames = [];
  updateHUD();

function generateLevel(room, li, gl){
  balls = [];
  targets = [];
  walls = [];
  particles = [];
  shockwaves = [];
  textPops = [];
  confetti = [];
  trailParticles = [];
  screenShake = 0;
  slowMo = 1;
  slowMoTimer = 0;

  var margin = 50;
  var topMargin = 80;
  var playW = W - margin * 2;
  var playH = H - topMargin - margin;

  // Shots
  if(isBossRoom){
    shotsLeft = totalShots = 1;
  } else {
    totalShots = Math.max(2, 5 - Math.floor(li / 2));
    shotsLeft = totalShots;
  }

  // Launch point
  launchX = W / 2;
  launchY = H - 60;

  // Targets
  var numTargets = isBossRoom ? 1 : Math.min(3 + li + Math.floor(gl / 3), 15);
  var types = room.targetTypes;

  for(var i = 0; i < numTargets; i++){
    var tx = margin + Math.random() * playW;
    var ty = topMargin + 30 + Math.random() * (playH * 0.55);
    var type = types[Math.floor(Math.random() * types.length)];
    if(isBossRoom) type = 'boss';
    var t = {
      x: tx, y: ty, r: isBossRoom ? 30 : (type === 'hard' ? 10 : 14),
      type: type, hp: isBossRoom ? 5 : (type === 'hard' ? 2 : 1),
      maxHp: isBossRoom ? 5 : (type === 'hard' ? 2 : 1),
      alive: true, pulse: 0, angle: Math.random() * Math.PI * 2,
      speed: type === 'moving' ? (1 + gl * 0.1) : 0,
      moveDir: Math.random() > 0.5 ? 1 : -1,
      ghostTimer: 0, ghostVisible: true,
      bh_pull: type === 'blackhole' ? (50 + gl * 2) : 0
    };
    targets.push(t);
  }

  targetsLeft = targets.filter(function(t){return t.alive}).length;

  // Walls
  var numWalls = Math.min(Math.floor(gl / 3), 6);
  for(var i = 0; i < numWalls; i++){
    var wx = margin + Math.random() * playW;
    var wy = topMargin + Math.random() * playH;
    var ww = 40 + Math.random() * 80;
    var wh = 8;
    if(Math.random() > 0.5){var tmp = ww; ww = wh; wh = tmp;}
    walls.push({x: wx, y: wy, w: ww, h: wh});
  }
}

function getBallColor(t){
  var skin = SKINS.find(function(s){return s.id === equippedSkin});
  if(!skin) return '#ff6b35';
  if(skin.color === 'rainbow'){
    return 'hsl(' + ((t || Date.now()) * 0.1 % 360) + ',100%,60%)';
  }
  return skin.color;
}

// ===== SHOOTING =====
function shoot(dx, dy){
  if(!gameActive || shooting || shotsLeft <= 0) return;
  var dist = Math.sqrt(dx*dx + dy*dy);
  if(dist < 10) return;
  shooting = true;
  shotsLeft--;
  save.totalShots = (save.totalShots||0) + 1;
  var speed = 10;
  var vx = (dx / dist) * speed;
  var vy = (dy / dist) * speed;
  balls.push({x: launchX, y: launchY, vx: vx, vy: vy, r: 8, active: true, bounces: 0, trail: []});
  sndShoot();
  updateHUD();
}

  aimY = e.touches[0].clientY;
},{passive:false});

},{passive:false});

  if(!aiming) return;

},{passive:false});

function spawnParticles(x, y, color, count, speed, size){
  for(var i = 0; i < count; i++){

    var spd = Math.random() * (speed || 5) + 1;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: Math.random() * (size || 4) + 1,
      color: color,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      gravity: 0.05 + Math.random() * 0.05
    });
  }
}

  el.style.top = y + 'px';
  el.style.color = '#f7c948';
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},800);
  sndCoin();
}

// ===== SCREEN SHAKE =====
function triggerShake(intensity){
  screenShake = Math.max(screenShake, intensity);
}

// ===== SLOW MOTION =====
function triggerSlowMo(duration){
  slowMo = 0.3;
  slowMoTimer = duration;
}

// ===== PHYSICS UPDATE =====
function update(){
  // Slow motion
  if(slowMoTimer > 0){
    slowMoTimer -= 16;
    if(slowMoTimer <= 0){slowMo = 1; slowMoTimer = 0;}
  }

  // Screen shake decay
  if(screenShake > 0) screenShake *= 0.9;
  if(screenShake < 0.5) screenShake = 0;

  // Update targets (moving, ghost)
  targets.forEach(function(t){
    if(!t.alive) return;
    if(t.type === 'moving'){
      t.x += t.speed * t.moveDir * slowMo;
      if(t.x < 50 || t.x > W - 50) t.moveDir *= -1;
    }
    if(t.type === 'ghost'){
      t.ghostTimer += 16 * slowMo;
      t.ghostVisible = Math.sin(t.ghostTimer * 0.003) > -0.3;
    }
    t.pulse = Math.max(0, (t.pulse || 0) - 0.02);
  });

  // Update balls
  var allBallsDone = true;
  balls.forEach(function(b){
    if(!b.active) return;
    allBallsDone = false;

    // Trail
    b.trail.push({x: b.x, y: b.y, life: 1});
    if(b.trail.length > 20) b.trail.shift();
    b.trail.forEach(function(tp){tp.life -= 0.05});
    spawnTrailParticle(b.x, b.y);

    // Apply slow motion
    var svx = b.vx * slowMo;
    var svy = b.vy * slowMo;

    // Gravity zones (Room 2+)
    if(currentRoom >= 1){
      targets.forEach(function(t){
        if(t.type === 'blackhole' && t.alive){
          var dx = t.x - b.x, dy = t.y - b.y;
          var dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < t.bh_pull && dist > 5){
            var force = 2 / dist;
            b.vx += (dx / dist) * force;
            b.vy += (dy / dist) * force;
          }
        }
      });
    }

    b.x += svx;
    b.y += svy;
    b.vy += 0.04 * slowMo; // light gravity

    // Wall bounce
    if(b.x < b.r){b.x = b.r; b.vx = Math.abs(b.vx); b.bounces++; sndBounce(); triggerShake(2);}
    if(b.x > W - b.r){b.x = W - b.r; b.vx = -Math.abs(b.vx); b.bounces++; sndBounce(); triggerShake(2);}
    if(b.y < b.r){b.y = b.r; b.vy = Math.abs(b.vy); b.bounces++; sndBounce(); triggerShake(2);}

    // Floor = ball lost
    if(b.y > H + 50){b.active = false; return;}

    // Wall collision
    walls.forEach(function(w){
      if(b.x + b.r > w.x && b.x - b.r < w.x + w.w && b.y + b.r > w.y && b.y - b.r < w.y + w.h){
        var overlapL = (b.x + b.r) - w.x;
        var overlapR = (w.x + w.w) - (b.x - b.r);
        var overlapT = (b.y + b.r) - w.y;
        var overlapB = (w.y + w.h) - (b.y - b.r);
        var minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB);
        if(minOverlap === overlapL || minOverlap === overlapR) b.vx *= -1;
        else b.vy *= -1;
        b.bounces++;
        sndBounce();
        triggerShake(2);
        spawnParticles(b.x, b.y, '#888', 3, 2, 2);
      }
    });

    // Target collision
    targets.forEach(function(t){
      if(!t.alive) return;
      if(t.type === 'ghost' && !t.ghostVisible) return;
      var dx = b.x - t.x, dy = b.y - t.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < b.r + t.r){
        t.hp--;
        t.pulse = 1;
        triggerShake(t.type === 'boss' ? 8 : 4);

        if(t.hp <= 0){
          t.alive = false;
          targetsLeft--;
          combo++;
          if(combo > maxCombo) maxCombo = combo;

          // Score
          var pts = t.type === 'boss' ? 500 : (t.type === 'hard' ? 30 : (t.type === 'crystal' ? 40 : 20));
          pts = pts * Math.max(1, combo);
          score += pts;
          showScoreFly(t.x, t.y - 20, pts);

          // Coins
          var coinAmt = Math.floor(pts / 20) + (combo > 2 ? combo : 0);
          coins += coinAmt;
          showCoinFly(t.x + 20, t.y, coinAmt);

          // Effects
          var effectColor = t.type === 'explosive' ? '#ff5722' : (t.type === 'crystal' ? '#81d4fa' : ROOMS[currentRoom].accent);
          spawnParticles(t.x, t.y, effectColor, 20 + combo * 5, 6, 5);
          spawnShockwave(t.x, t.y, effectColor);

          if(t.type === 'explosive'){
            sndExplode();
            triggerShake(10);
            // Chain explosion
            targets.forEach(function(t2){
              if(t2.alive && t2 !== t){
                var d2 = Math.sqrt(Math.pow(t2.x-t.x,2)+Math.pow(t2.y-t.y,2));
                if(d2 < 100){
                  t2.hp -= 2;
                  if(t2.hp <= 0){
                    t2.alive = false;
                    targetsLeft--;
                    combo++;
                    if(combo > maxCombo) maxCombo = combo;
                    var p2 = 20 * combo;
                    score += p2;
                    showScoreFly(t2.x, t2.y - 20, p2);
                    spawnParticles(t2.x, t2.y, '#ff5722', 15, 5, 4);
                    spawnShockwave(t2.x, t2.y, '#ff5722');
                  }
                }
              }
            });
            spawnParticles(t.x, t.y, '#ff5722', 40, 10, 8);
          } else if(t.type === 'crystal'){
            sndShatter();
            // Glass shards
            for(var s = 0; s < 12; s++){
              var angle = Math.random() * Math.PI * 2;
              var spd = Math.random() * 6 + 2;
              particles.push({
                x: t.x, y: t.y,
                vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
                r: Math.random()*5+2, color: 'rgba(200,230,255,0.8)',
                life: 1, decay: 0.01, gravity: 0.1,
                isShard: true, rotation: Math.random()*360, rotSpeed: Math.random()*10
              });
            }
          } else if(t.type === 'boss'){
            sndBoss();
            triggerShake(15);
            triggerSlowMo(1500);
            spawnConfetti(t.x, t.y, 60);
            spawnParticles(t.x, t.y, '#f7c948', 50, 10, 8);
          } else {
            sndHit();
          }

          // Combo text
          showComboText(combo);

          // Slow mo on big combo
          if(combo >= 3) triggerSlowMo(400);
        } else {
          // Target damaged but alive
          sndHit();
          spawnParticles(t.x, t.y, '#fff', 5, 3, 2);
          // Bounce ball
          b.vx = (dx/dist) * 7;
          b.vy = (dy/dist) * 7;
        }
      }
    });
  });

  // Trail particles update
  trailParticles.forEach(function(tp){tp.life -= tp.decay});
  trailParticles = trailParticles.filter(function(tp){return tp.life > 0});

  // Particles update
  particles.forEach(function(p){
    p.x += p.vx * slowMo;
    p.y += p.vy * slowMo;
    p.vy += (p.gravity || 0) * slowMo;
    p.life -= p.decay * slowMo;
    if(p.isShard) p.rotation += (p.rotSpeed || 0);
  });
  particles = particles.filter(function(p){return p.life > 0});

  // Shockwaves update
  shockwaves.forEach(function(s){
    s.r += 3 * slowMo;
    s.life -= 0.03 * slowMo;
  });
  shockwaves = shockwaves.filter(function(s){return s.life > 0});

  // TextPops update
  textPops.forEach(function(t){
    t.y += t.vy;
    t.life -= 0.02;
  });
  textPops = textPops.filter(function(t){return t.life > 0});

  // Confetti update
  confetti.forEach(function(c){
    c.x += c.vx;
    c.y += c.vy;
    c.vy += c.gravity;
    c.rotation += c.rotSpeed;
    c.life -= c.decay;
  });
  confetti = confetti.filter(function(c){return c.life > 0});

  // Check win/lose
  if(shooting && allBallsDone && balls.length > 0){
    shooting = false;
    combo = 0;
    if(targetsLeft <= 0){
      setTimeout(levelComplete, 300);
    } else if(shotsLeft <= 0){
      setTimeout(gameOver, 500);
    }
  }

  updateHUD();
}

// ===== LEVEL COMPLETE =====
function levelComplete(){
  gameActive = false;
  isRecording = false;
  var starsEarned = shotsLeft >= 2 ? 3 : (shotsLeft >= 1 ? 2 : 1);
  var isPerfect = (totalShots - shotsLeft <= 1) && targetsLeft <= 0 && targets.length > 1;

  if(isPerfect){
    save.totalPerfects = (save.totalPerfects || 0) + 1;
    sndPerfect();
    triggerSlowMo(1000);
    spawnConfetti(W/2, H/2, 80);
  } else {
    sndWin();
    spawnConfetti(W/2, H/3, 40);
  }

  // Coin bonus
  var coinBonus = starsEarned * 5 + (isPerfect ? 25 : 0) + (maxCombo > 2 ? maxCombo * 3 : 0);
  coins += coinBonus;

  // Save progress
  if(save.roomProgress[currentRoom]){
    var old = save.roomProgress[currentRoom].levels[currentRoomLevel];
    if(starsEarned > old) save.roomProgress[currentRoom].levels[currentRoomLevel] = starsEarned;
  }

  var globalLevel = currentRoom * 5 + currentRoomLevel + 1;
  if(globalLevel > save.bestLevel) save.bestLevel = globalLevel;
  if(score > save.highScore) save.highScore = score;
  if(maxCombo >= 5) save.totalCombos = (save.totalCombos || 0) + 1;

  // Boss check
  if(isBossRoom){
    save.totalBosses = (save.totalBosses || 0) + 1;
    if(currentRoom < ROOMS.length - 1){
      save.roomProgress[currentRoom].cleared = true;
      save.roomProgress[currentRoom + 1].unlocked = true;
    }
    saveSave();
    checkAchievements();
    setTimeout(function(){showBossClear(coinBonus)}, 500);
    return;
  }

  saveSave();
  checkAchievements();

  // Show level complete
  var lcEmoji = document.getElementById('lcEmoji');
  var lcTitle = document.getElementById('lcTitle');
  var lcStars = document.getElementById('lcStars');
  var lcScore = document.getElementById('lcScore');
  var lcCoins = document.getElementById('lcCoins');
  var lcPerfect = document.getElementById('lcPerfect');

  lcEmoji.innerHTML = isPerfect ? '&#x1F4A5;' : '&#x1F389;';
  lcTitle.textContent = isPerfect ? 'PERFECT SHOT!' : 'LEVEL COMPLETE!';
  lcTitle.style.color = isPerfect ? '#ff6b35' : '#4CAF50';
  lcStars.textContent = '⭐'.repeat(starsEarned) + '☆'.repeat(3 - starsEarned);
  lcScore.textContent = '+' + score;
  lcCoins.innerHTML = '&#x1FA99; +' + coinBonus;
  lcPerfect.style.display = isPerfect ? 'block' : 'none';

  showScreen('levelCompleteS');
}

function showBossClear(coinBonus){
  var room = ROOMS[currentRoom];
  var nextRoom = currentRoom < ROOMS.length - 1 ? ROOMS[currentRoom + 1] : null;
  document.getElementById('bcRoom').textContent = room.name + ' CLEARED!';
  document.getElementById('bcUnlock').innerHTML = nextRoom ? '&#x1F513; ' + nextRoom.name + ' Unlocked!' : '&#x1F31F; All Rooms Complete!';
  document.getElementById('bcCoins').innerHTML = '&#x1FA99; +' + (coinBonus + 50);
  coins += 50;
  saveSave();
  sndWin();
  spawnConfetti(W/2, H/3, 100);
  showScreen('bossClearS');
}

function nextLevel(){
  if(isBossRoom && currentRoom < ROOMS.length - 1){
    openRoomIntro(currentRoom + 1);
  } else if(currentRoomLevel < 4){
    startRoomLevel(currentRoom, currentRoomLevel + 1);
  } else {
    startWorldMap();
  }
}

// ===== GAME OVER =====
function gameOver(){
  gameActive = false;
  isRecording = false;
  sndFail();

  var leftCount = targets.filter(function(t){return t.alive}).length;
  var total = targets.length;

  // "Tuh be" system
  var goEmoji = document.getElementById('goEmoji');
  var goTitle = document.getElementById('goTitle');
  var goSubtitle = document.getElementById('goSubtitle');
  var goTargetLeft = document.getElementById('goTargetLeft');

  if(leftCount === 1){
    goEmoji.innerHTML = '&#x1F629;';
    goTitle.textContent = 'SO CLOSE!';
    goSubtitle.textContent = 'Just ONE target left!';
    goTargetLeft.innerHTML = '&#x1F4A2; Almost had it!';
    triggerSlowMo(800);
    // Pulse the remaining target
    targets.forEach(function(t){if(t.alive) t.pulse = 2;});
  } else if(leftCount <= 2){
    goEmoji.innerHTML = '&#x1F624;';
    goTitle.textContent = 'ALMOST!';
    goSubtitle.textContent = leftCount + ' targets remaining';
    goTargetLeft.textContent = 'So close yet so far...';
  } else {
    goEmoji.innerHTML = '&#x1F614;';
    goTitle.textContent = 'TRY AGAIN';
    goSubtitle.textContent = leftCount + '/' + total + ' targets left';
    goTargetLeft.textContent = 'You can do this!';
  }

  triggerShake(6);
  showScreen('gameOverS');
}

function shopTab(tab){
  var tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(function(t,i){
    t.classList.remove('active');
    if((tab==='skins'&&i===0)||(tab==='trails'&&i===1)||(tab==='effects'&&i===2)) t.classList.add('active');
  });
  var grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  var items = tab === 'skins' ? SKINS : (tab === 'trails' ? TRAILS : EFFECTS);
  var ownedList = tab === 'skins' ? save.ownedSkins : (tab === 'trails' ? save.ownedTrails : save.ownedEffects);
  var equipped = tab === 'skins' ? equippedSkin : (tab === 'trails' ? equippedTrail : equippedEffect);

  items.forEach(function(item){
    var owned = ownedList.indexOf(item.id) !== -1;
    var isEquipped = equipped === item.id;
    var div = document.createElement('div');
    div.className = 'shop-item' + (isEquipped ? ' equipped' : (owned ? ' owned' : ''));

    var preview = '';
    if(tab === 'skins'){
      var bgColor = item.color === 'rainbow' ? 'linear-gradient(135deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#8b00ff)' : item.color;
      preview = '<div class="skin-preview" style="background:' + bgColor + ';box-shadow:0 0 10px ' + (item.color === 'rainbow' ? '#fff' : item.color) + '"></div>';
    } else if(tab === 'trails'){
      var tColor = item.color === 'rainbow' ? '#fff' : (item.color === 'transparent' ? '#555' : item.color);
      preview = '<div style="font-size:1.8em;margin-bottom:4px;color:' + tColor + '">\u2728</div>';
    } else {
      preview = '<div style="font-size:1.8em;margin-bottom:4px">&#x1F4A5;</div>';
    }

    div.innerHTML = preview +
      '<div class="skin-name">' + item.name + '</div>' +
      '<div class="skin-price">' + (isEquipped ? '✅ EQUIPPED' : (owned ? 'TAP TO EQUIP' : '&#x1FA99; ' + item.price)) + '</div>';

    div.onclick = function(){
      if(isEquipped) return;
      if(owned){
        // Equip
        if(tab === 'skins') equippedSkin = item.id;
        else if(tab === 'trails') equippedTrail = item.id;
        else equippedEffect = item.id;
        saveSave();
        shopTab(tab);
      } else if(coins >= item.price){
        // Buy
        coins -= item.price;
        ownedList.push(item.id);
        if(tab === 'skins') equippedSkin = item.id;
        else if(tab === 'trails') equippedTrail = item.id;
        else equippedEffect = item.id;
        sndCoin();
        saveSave();
        shopTab(tab);
        document.getElementById('shopCoins').innerHTML = '&#x1FA99; ' + coins;
      }
    };
    grid.appendChild(div);
  });
}

const SPIN_REWARDS = [
  {label:'&#x1FA99; 10',coins:10,color:'#ff6b35'},
  {label:'&#x1FA99; 25',coins:25,color:'#4CAF50'},
  {label:'&#x1FA99; 50',coins:50,color:'#2196F3'},

  {label:'&#x1FA99; 15',coins:15,color:'#9c27b0'},

function renderWheel(){
  var wheel = document.getElementById('spinWheel');
  wheel.innerHTML = '';
  var segAngle = 360 / SPIN_REWARDS.length;
  SPIN_REWARDS.forEach(function(reward, i){
    var seg = document.createElement('div');
    seg.className = 'spin-segment';
    seg.style.transform = 'rotate(' + (i * segAngle) + 'deg)';
    seg.style.color = reward.color;
    seg.textContent = reward.label;
    wheel.appendChild(seg);
  });
  // Draw segments on canvas-like background
  wheel.style.background = 'conic-gradient(' + SPIN_REWARDS.map(function(r,i){
    var start = (i/SPIN_REWARDS.length*100);
    var end = ((i+1)/SPIN_REWARDS.length*100);
    return r.color + '22 ' + start + '% ' + end + '%';
  }).join(',') + ')';
}

function doSpin(){
  var today = new Date().toDateString();
  if(save.dailySpinDate === today) return;

  var btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.style.opacity = '0.5';

  // Random result
  var resultIdx = Math.floor(Math.random() * SPIN_REWARDS.length);
  var reward = SPIN_REWARDS[resultIdx];
  var segAngle = 360 / SPIN_REWARDS.length;
  var targetAngle = 360 * 5 + (360 - resultIdx * segAngle - segAngle/2); // 5 full spins + land on segment

  var wheel = document.getElementById('spinWheel');
  wheel.style.transition = 'transform 3s cubic-bezier(0.17,0.67,0.12,0.99)';
  wheel.style.transform = 'rotate(' + targetAngle + 'deg)';

  // Tick sounds during spin
  var tickInterval = setInterval(function(){sndSpin()}, 100);
  setTimeout(function(){clearInterval(tickInterval)}, 2800);

  setTimeout(function(){
    coins += reward.coins;
    save.dailySpinDate = today;
    saveSave();
    sndWin();
    spawnConfetti(W/2, H/2, 40);
    document.getElementById('spinResult').textContent = 'You won ' + reward.coins + ' coins!';
    document.getElementById('spinResult').style.display = 'block';
    document.getElementById('spinStatus').textContent = 'Come back tomorrow!';
  }, 3200);
}

  bgParticles = [];
  for(var i = 0; i < 50; i++){
    bgParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      opacity: Math.random() * 0.3 + 0.1,
      drift: Math.random() * 0.5 - 0.25
    });
  }
}
initBgParticles();

function drawBackground(){
  var room = ROOMS[currentRoom] || ROOMS[0];
  // Gradient background
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, room.bg1);
  grad.addColorStop(1, room.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = room.grid;
  ctx.lineWidth = 1;
  var gridSize = 40;
  for(var x = 0; x < W; x += gridSize){
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for(var y = 0; y < H; y += gridSize){
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Floating particles (parallax)
  bgParticles.forEach(function(p){
    p.y -= p.speed;
    p.x += p.drift;
    if(p.y < -5) {p.y = H + 5; p.x = Math.random() * W;}
    if(p.x < -5) p.x = W + 5;
    if(p.x > W + 5) p.x = -5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = room.accent.replace(')', ',' + p.opacity + ')').replace('rgb', 'rgba');
    // Fallback for hex colors
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = room.accent;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ===== DRAW =====
function draw(){
  ctx.save();

  // Screen shake
  if(screenShake > 0.5){
    var sx = (Math.random() - 0.5) * screenShake * 2;
    var sy = (Math.random() - 0.5) * screenShake * 2;
    ctx.translate(sx, sy);
  }

  drawBackground();

  // Walls
  var room = ROOMS[currentRoom] || ROOMS[0];
  walls.forEach(function(w){
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = room.accent;
    ctx.lineWidth = 1;
    ctx.strokeRect(w.x, w.y, w.w, w.h);
  });

  // Shockwaves
  shockwaves.forEach(function(s){
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2 * s.life;
    ctx.globalAlpha = s.life * 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Targets
  targets.forEach(function(t){
    if(!t.alive) return;
    if(t.type === 'ghost' && !t.ghostVisible){
      ctx.globalAlpha = 0.15;
    }

    var pulse = 1 + (t.pulse || 0) * 0.3;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.scale(pulse, pulse);

    // Target glow
    var glowColor = t.type === 'explosive' ? '#ff5722' :
                    t.type === 'crystal' ? '#81d4fa' :
                    t.type === 'hard' ? '#ff9800' :
                    t.type === 'moving' ? '#76ff03' :
                    t.type === 'ghost' ? '#b0bec5' :
                    t.type === 'blackhole' ? '#9c27b0' :
                    t.type === 'boss' ? '#ff1744' :
                    room.accent;

    // Outer glow
    ctx.beginPath();
    ctx.arc(0, 0, t.r + 6, 0, Math.PI*2);
    ctx.fillStyle = glowColor;
    ctx.globalAlpha = 0.15 + Math.sin(Date.now()*0.005)*0.05;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Main circle
    ctx.beginPath();
    ctx.arc(0, 0, t.r, 0, Math.PI*2);
    var tGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, t.r);
    tGrad.addColorStop(0, glowColor);
    tGrad.addColorStop(1, glowColor + '88');
    ctx.fillStyle = tGrad;
    ctx.fill();
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 2;
    ctx.stroke();

    // HP bar for boss/hard
    if(t.maxHp > 1){
      var hpPct = t.hp / t.maxHp;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(-t.r, t.r + 4, t.r*2, 4);
      ctx.fillStyle = hpPct > 0.5 ? '#4CAF50' : (hpPct > 0.25 ? '#ff9800' : '#ff1744');
      ctx.fillRect(-t.r, t.r + 4, t.r*2*hpPct, 4);
    }

    // Type icon
    ctx.fillStyle = '#fff';
    ctx.font = (t.r * 0.8) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var icon = t.type === 'explosive' ? E_BOMB :
              t.type === 'crystal' ? E_GEM :
              t.type === 'hard' ? E_SHIELD :
              t.type === 'moving' ? E_ARROW :
              t.type === 'ghost' ? E_GHOST :
              t.type === 'blackhole' ? E_CYCLONE :
              t.type === 'boss' ? E_SKULL : '';
    if(icon) ctx.fillText(icon, 0, 0);

    ctx.restore();
    ctx.globalAlpha = 1;
  });

  // Ball trail particles
  trailParticles.forEach(function(tp){
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, tp.r * tp.life, 0, Math.PI*2);
    ctx.fillStyle = tp.color;
    ctx.globalAlpha = tp.life * 0.5;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Balls
  balls.forEach(function(b){
    if(!b.active) return;

    // Trail
    b.trail.forEach(function(tp, idx){
      if(tp.life <= 0) return;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, b.r * tp.life * 0.6, 0, Math.PI*2);
      ctx.fillStyle = getBallColor();
      ctx.globalAlpha = tp.life * 0.3;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Ball glow
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 8, 0, Math.PI*2);
    ctx.fillStyle = getBallColor();
    ctx.globalAlpha = 0.2;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Ball
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    var bGrad = ctx.createRadialGradient(b.x - 2, b.y - 2, 0, b.x, b.y, b.r);
    bGrad.addColorStop(0, '#fff');
    bGrad.addColorStop(0.4, getBallColor());
    bGrad.addColorStop(1, getBallColor());
    ctx.fillStyle = bGrad;
    ctx.fill();
  });

  // Particles
  particles.forEach(function(p){
    ctx.save();
    if(p.isShard){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fillRect(-p.r, -p.r/3, p.r*2, p.r*0.6);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  });

  // Aiming line
  if(aiming && !shooting && gameActive){
    var dx = aimX - launchX;
    var dy = aimY - launchY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > 10){
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(launchX, launchY);
      ctx.lineTo(launchX + dx/dist * 150, launchY + dy/dist * 150);
      ctx.strokeStyle = getBallColor();
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }
  }

  // Launch point
  if(gameActive && !shooting){
    ctx.beginPath();
    ctx.arc(launchX, launchY, 12, 0, Math.PI*2);
    ctx.fillStyle = getBallColor();
    ctx.globalAlpha = 0.3 + Math.sin(Date.now()*0.005)*0.1;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(launchX, launchY, 6, 0, Math.PI*2);
    ctx.fillStyle = getBallColor();
    ctx.fill();
  }

  ctx.restore();

  // Draw confetti on confetti canvas
  cctx.clearRect(0, 0, W, H);
  confetti.forEach(function(c){
    cctx.save();
    cctx.translate(c.x, c.y);
    cctx.rotate(c.rotation * Math.PI / 180);
    cctx.fillStyle = c.color;
    cctx.globalAlpha = c.life;
    cctx.fillRect(-c.r, -c.r/2, c.r*2, c.r);
    cctx.restore();
  });

  // Slow-mo indicator
  if(slowMo < 1){
    ctx.fillStyle = 'rgba(255,107,53,0.15)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff6b35';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.6;
    ctx.fillText('⏳ SLOW MOTION', W/2, H - 25);
    ctx.globalAlpha = 1;
  }
}

// ===== GAME LOOP =====
function gameLoop(){
  if(gameActive) update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== INIT =====
initFromSave();
if(!tutorialDone){
  startTutorial();
} else {
  showMenu();
}
gameLoop();
</script>
