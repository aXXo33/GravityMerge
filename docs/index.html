<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ricochet Lab: Chain Reactor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none;-webkit-user-select:none}
#W{position:relative;width:400px;height:750px;margin:auto}
canvas{display:block;border-radius:12px}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none;z-index:10}
.sb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px 10px;color:#fff;font-size:11px;text-align:center;backdrop-filter:blur(4px)}
.sl{color:#666;font-size:8px;text-transform:uppercase;letter-spacing:1px}
.sv{font-size:16px;font-weight:800}
#combo{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.15s}
#screenFlash{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:25;opacity:0;border-radius:12px;transition:opacity 0.15s}
.ov{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(5,5,16,0.95);border-radius:12px;z-index:30;padding:24px;overflow-y:auto}
.btn{padding:12px 36px;border-radius:40px;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform 0.1s;margin:4px}
.btn:active{transform:scale(0.95)}
.bp{background:linear-gradient(135deg,#7048e8,#3a85ff);color:#fff;box-shadow:0 4px 24px rgba(112,72,232,0.5)}
.bs{background:rgba(255,255,255,0.06);color:#888;border:1px solid rgba(255,255,255,0.1)}
#pbar{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.pb{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;pointer-events:all}
.pb:active{transform:scale(0.9)}
.pb.on{background:rgba(112,72,232,0.35);border-color:#7048e8;box-shadow:0 0 12px rgba(112,72,232,0.6)}
.scb{font-size:22px;color:#7888ff;margin:5px 0 14px;font-weight:700}
#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.2);font-size:9px;pointer-events:none;letter-spacing:1px}
#lvlB{position:absolute;top:68px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:800;color:#fff;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.3s;text-shadow:0 0 15px rgba(120,136,255,0.5)}
#roomName{position:absolute;top:52px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;pointer-events:none;z-index:15;letter-spacing:2px;text-transform:uppercase}
/* Map styles */
.map-room{display:flex;align-items:center;margin:6px 0;width:100%;padding:8px 12px;border-radius:12px;cursor:pointer;transition:transform 0.15s,background 0.2s}
.map-room:hover{transform:scale(1.02)}
.map-room.locked{opacity:0.35;cursor:default}
.map-room.locked:hover{transform:none}
.map-room.current{box-shadow:0 0 20px rgba(120,136,255,0.3)}
.mr-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mr-info{margin-left:12px;flex:1}
.mr-title{color:#fff;font-size:13px;font-weight:700}
.mr-sub{color:#888;font-size:10px;margin-top:2px}
.mr-prog{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:5px;overflow:hidden}
.mr-bar{height:100%;border-radius:4px;transition:width 0.3s}
.mr-stars{color:#ffeb3b;font-size:11px;margin-left:8px;white-space:nowrap}
.boss-tag{background:#ff5252;color:#fff;font-size:8px;padding:1px 5px;border-radius:4px;margin-left:6px;font-weight:700}
.lvl-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin:3px;cursor:pointer;transition:transform 0.1s;border:2px solid transparent}
.lvl-dot:hover{transform:scale(1.15)}
.lvl-dot.done{opacity:0.7}.lvl-dot.cur{border-color:#fff;transform:scale(1.15)}
.lvl-dot.boss{border:2px solid #ff5252}
.lvl-dot.locked{opacity:0.2;cursor:default}
</style>
</head>
<body>
<div id="W">
<canvas id="c" width="400" height="750"></canvas>
<div id="screenFlash"></div>

<div class="sb"><div class="sl">Score</div><div class="sv" id="sV">0</div></div>

<!-- MENU -->

<div id="goMsg" style="color:#888;font-size:12px;margin-bottom:6px"></div>
<div class="scb" id="goSc"></div>

<button class="btn bs" id="rsBtn" style="margin-top:3px;font-size:11px">MAP</button>
</div>
</div><script>
// ===== AUDIO =====
var AC=null;
function initAudio(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,d,t,v){if(!AC)return;try{var o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(d||0.2));o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+(d||0.2))}catch(e){}}
function sndBounce(){tone(600+Math.random()*500,0.05,'square',0.03)}
function sndHit(){tone(300,0.1,'sawtooth',0.08);tone(150,0.15,'sine',0.05)}
function sndExplode(){tone(80,0.3,'sawtooth',0.15);tone(60,0.4,'sine',0.1);tone(200,0.1,'square',0.07)}
function sndCombo(n){for(var i=0;i<Math.min(n,8);i++){(function(j){setTimeout(function(){tone(440*Math.pow(1.15,j),0.1,'sine',0.08)},j*50)})(i)}}
function sndPerfect(){for(var i=0;i<10;i++){(function(j){setTimeout(function(){tone(523*Math.pow(1.1,j),0.15,'sine',0.07)},j*70)})(i)}}
function sndShatter(){for(var i=0;i<5;i++)setTimeout(function(){tone(1500+Math.random()*3000,0.04,'square',0.03)},i*15)}
function sndFail(){tone(180,0.2,'sawtooth',0.07);setTimeout(function(){tone(130,0.3,'sawtooth',0.05)},120)}
function sndShoot(){tone(500,0.07,'sine',0.07);tone(800,0.05,'square',0.03)}
function sndLevelUp(){tone(523,0.1,'sine',0.08);setTimeout(function(){tone(659,0.1,'sine',0.08)},100);setTimeout(function(){tone(784,0.12,'sine',0.1)},200)}
function sndBossWin(){for(var i=0;i<12;i++){(function(j){setTimeout(function(){tone(440*Math.pow(1.08,j),0.2,'sine',0.08)},j*80)})(i)}}

// ===== ROOMS =====
var ROOMS=[
  {id:0,name:'Glass Lab',icon:'\u{1F52C}',color:'#4fc3f7',bg1:'#081828',bg2:'#0a1e30',grid:'rgba(79,195,247,0.03)',desc:'Clean & simple. Break the glass targets!',mechanic:'Basic bouncing',levels:5},
  {id:1,name:'Gravity Lab',icon:'\u{1F30C}',color:'#ab47bc',bg1:'#180828',bg2:'#1a0a2e',grid:'rgba(171,71,188,0.03)',desc:'Gravity zones pull your ball. Master the curves!',mechanic:'Gravity zones',levels:5},
  {id:2,name:'Chaos Lab',icon:'\u{1F525}',color:'#ff5722',bg1:'#281008',bg2:'#2e120a',grid:'rgba(255,87,34,0.03)',desc:'Portals, lasers & explosions everywhere!',mechanic:'Portals + Explosive chains',levels:5},
  {id:3,name:'Neon Lab',icon:'\u{1F4A0}',color:'#00e5ff',bg1:'#002828',bg2:'#003030',grid:'rgba(0,229,255,0.03)',desc:'Ghost targets & blackholes. Nothing is real!',mechanic:'Ghost + Blackhole',levels:5},
  {id:4,name:'Void Lab',icon:'\u{1F573}',color:'#ff1744',bg1:'#280808',bg2:'#300a0a',grid:'rgba(255,23,68,0.03)',desc:'The ultimate test. Everything at once!',mechanic:'All mechanics combined',levels:5},
  {id:5,name:'Endless Lab',icon:'\u267E',color:'#ffeb3b',bg1:'#282008',bg2:'#302808',grid:'rgba(255,235,59,0.03)',desc:'Infinite levels. How far can you go?',mechanic:'Endless + increasing difficulty',levels:999}
];
var ROOM_LEVELS=5; // levels per room (except endless)

// ===== SAVE =====
var save={hs:0,roomProgress:[],stars:{},totalStars:0,streak:0,lastDay:'',bestEndless:0};
function loadSave(){try{var s=localStorage.getItem('rl2_save');if(s)save=JSON.parse(s)}catch(e){}}
function doSave(){try{localStorage.setItem('rl2_save',JSON.stringify(save))}catch(e){}}
loadSave();
function checkStreak(){var t=new Date().toISOString().split('T')[0];if(save.lastDay===t)return;var y=new Date();y.setDate(y.getDate()-1);var yd=y.toISOString().split('T')[0];save.streak=save.lastDay===yd?save.streak+1:1;save.lastDay=t;doSave()}
checkStreak();
function isRoomUnlocked(r){if(r===0)return true;var prev=r-1;return isBossCleared(prev)}
function isBossCleared(r){return save.roomProgress.indexOf(r)>=0}
function getLevelStars(r,l){return save.stars[r+'_'+l]||0}
function setLevelStars(r,l,s){var k=r+'_'+l;var old=save.stars[k]||0;if(s>old){save.stars[k]=s;save.totalStars+=(s-old)}doSave()}
function getRoomStars(r){var t=0;for(var i=1;i<=ROOMS[r].levels;i++)t+=getLevelStars(r,i);return t}
var fakeOnline=Math.floor(2000+Math.random()*8000);
setInterval(function(){fakeOnline+=Math.floor(Math.random()*40-15);fakeOnline=Math.max(1000,fakeOnline)},5000);

// ===== CORE =====
var c=document.getElementById('c'),ctx=c.getContext('2d'),WW=400,HH=750;
var state='menu',score=0,combo=0,curRoom=0,curLevel=1,shots=0,maxShots=3;
var activePU=null,particles=[],shards=[],shockwaves=[],balls=[],targets=[],portals=[],walls=[],gravZones=[];
var aimEnd=null,slowFactor=1,shake=0,floaters=[],levelCleared=false,levelScore=0;
var BALL_R=8,BALL_SPEED=11,MAX_BOUNCES=18;
var slowMoReplay=false,replayTimer=0;

var TCFG={
  normal:{hp:1,r:18,pts:10,c1:'#4fc3f7',c2:'#0288d1',glow:'#4fc3f788'},
  hard:{hp:2,r:20,pts:25,c1:'#ff7043',c2:'#d84315',glow:'#ff704388'},
  crystal:{hp:1,r:20,pts:50,c1:'#e0f7fa',c2:'#80deea',glow:'#80deea88',shatter:1},
  explosive:{hp:1,r:20,pts:75,c1:'#ff6f00',c2:'#e65100',glow:'#ff6f0088',explode:1},
  moving:{hp:1,r:18,pts:30,c1:'#ab47bc',c2:'#7b1fa2',glow:'#ab47bc88'},
  ghost:{hp:1,r:18,pts:60,c1:'#b0bec5',c2:'#78909c',glow:'#b0bec544'},
  blackhole:{hp:3,r:24,pts:150,c1:'#311b92',c2:'#000',glow:'#9c27b066'},
  boss:{hp:5,r:28,pts:500,c1:'#ff1744',c2:'#b71c1c',glow:'#ff174466'}
};
// ===== ROOM-AWARE LEVEL GENERATOR =====
function genLevel(room,lvl){
  var rm=ROOMS[room];var isBoss=(lvl===ROOM_LEVELS&&room<5);
  var globalDiff=room*1.2+lvl*0.5;
  var numT=isBoss?8:Math.min(3+Math.floor(globalDiff*0.7),12);
  var numS=isBoss?1:Math.max(1,Math.ceil(numT/3)-Math.floor(globalDiff/5));
  if(room===0&&lvl<=2)numS=3;
  var types=['normal'];
  // Room-specific types
  if(room===0){if(lvl>=2)types.push('crystal');if(lvl>=4)types.push('hard')}
  if(room===1){types.push('hard');if(lvl>=2)types.push('moving');if(lvl>=4)types.push('crystal')}
  if(room===2){types.push('explosive','hard');if(lvl>=3)types.push('crystal','moving')}
  if(room===3){types.push('ghost','hard');if(lvl>=2)types.push('blackhole');if(lvl>=4)types.push('crystal')}
  if(room>=4){types=['normal','hard','crystal','explosive','moving','ghost'];if(lvl>=3||room===5)types.push('blackhole')}
  if(room===5){var el=Math.floor(lvl/5);for(var i=0;i<el;i++)types.push('explosive','hard')}

  var tgts=[],rows=Math.ceil(numT/4),placed=0;
  for(var row=0;row<rows&&placed<numT;row++){
    var cols=Math.min(numT-placed,3+Math.floor(Math.random()*2));
    var sp=WW/(cols+1);var yB=120+row*70+Math.random()*12;
    for(var col=0;col<cols&&placed<numT;col++){
      var tx=sp*(col+1)+Math.random()*20-10;var ty=yB+Math.random()*12-6;
      tx=Math.max(28,Math.min(WW-28,tx));ty=Math.max(90,Math.min(HH-200,ty));
      var type=types[Math.floor(Math.random()*types.length)];
      if(placed===0&&room===0&&lvl<=2)type='normal';
      var t={x:tx,y:ty,type:type};
      if(type==='moving')t.dx=(Math.random()>0.5?1:-1)*(0.6+Math.random()*0.7);
      tgts.push(t);placed++;
    }
  }
  // Boss target
  if(isBoss){tgts.push({x:WW/2,y:160,type:'boss'})}
  // Chain reaction opportunity
  if(room>=2&&Math.random()<0.3){var ei=Math.floor(Math.random()*tgts.length);if(tgts[ei].type!=='boss')tgts[ei].type='explosive'}

  var pts=[];
  if(room===2||(room>=3&&Math.random()<0.35)){
    var py=130+Math.random()*(HH-350);
    pts.push({ax:30,ay:py,bx:WW-30,by:py+Math.random()*70-35});
  }
  var gzs=[];
  if(room===1||(room>=3&&Math.random()<0.3)){
    gzs.push({x:100+Math.random()*200,y:200+Math.random()*200,w:80+Math.random()*60,h:80+Math.random()*60,gy:0.4+Math.random()*0.3});
  }
  var wls=[];
  if(room>=2&&Math.random()<0.3){wls.push({x:60+Math.random()*(WW-160),y:180+Math.random()*(HH-380),w:60+Math.random()*50,h:5})}
  return {shots:numS,targets:tgts,portals:pts,walls:wls,gravZones:gzs};
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function spawnP(x,y,n,col,spd,life){spd=spd||4;life=life||40;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=spd*(0.3+Math.random());particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,ml:life,color:col,r:2+Math.random()*4,glow:Math.random()>0.4})}}
function spawnShards(x,y,col,n){n=n||12;sndShatter();for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2+Math.random()*0.4,s=3+Math.random()*6;shards.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:45,ml:45,color:col,angle:Math.random()*Math.PI,spin:(Math.random()-0.5)*0.4,w:3+Math.random()*7,h:2+Math.random()*3})}}
function spawnSW(x,y,col,maxR){shockwaves.push({x:x,y:y,r:8,maxR:maxR||120,color:col||'#fff',life:18,ml:18})}
function screenFlash(col){var el=document.getElementById('screenFlash');el.style.background=col;el.style.opacity=0.35;setTimeout(function(){el.style.opacity=0},100)}
function doShake(a){shake=Math.max(shake,a)}
function showFloat(t,x,y,col,sz){floaters.push({text:t,x:x,y:y,color:col||'#fff',size:sz||18,life:45,ml:45,vy:-2.2})}
function flashCombo(c){var el=document.getElementById('combo');var cols=['#fff','#ffeb3b','#ff9800','#ff5722','#e91e63','#aa00ff','#00e5ff'];var col=cols[Math.min(c-1,cols.length-1)];var labels=['','HIT!','DOUBLE!','TRIPLE!','QUAKE!','INSANE!','GODLIKE!'];el.textContent=c>=2?(labels[Math.min(c,labels.length-1)]||('x'+c+'!')):'' ;el.style.color=col;el.style.opacity=1;el.style.fontSize=Math.min(16+c*6,58)+'px';el.style.textShadow='0 0 '+Math.min(18+c*8,60)+'px '+col;setTimeout(function(){el.style.opacity=0},700);sndCombo(c);if(c>=3){doShake(c*2);screenFlash(col)}if(c>=4)spawnSW(WW/2,HH/2,col,200)}
function explode(x,y,r){r=r||90;sndExplode();spawnSW(x,y,'#ff6f00',r*1.3);spawnP(x,y,30,'#ff6f00',7,40);spawnP(x,y,20,'#ffcc02',5,30);spawnP(x,y,12,'#fff',9,15);screenFlash('#ff6f00');doShake(10);targets.forEach(function(t){if(t.alive&&dist(t,{x:x,y:y})<r+t.r)damageTarget(t)})}
function damageTarget(t){if(!t.alive)return;t.hp--;t.flash=10;spawnP(t.x,t.y,8,TCFG[t.type].c1,3,20);
  if(t.hp<=0){t.alive=false;var earned=t.pts*Math.max(1,combo);score+=earned;levelScore+=earned;combo++;flashCombo(combo);showFloat('+'+earned,t.x,t.y-12,'#ffeb3b',15+Math.min(combo*2,16));sndHit();
    if(TCFG[t.type].shatter){spawnShards(t.x,t.y,TCFG[t.type].c1,16);spawnSW(t.x,t.y,TCFG[t.type].c1,70)}
    else{spawnP(t.x,t.y,24,TCFG[t.type].c1,6,35);spawnP(t.x,t.y,12,'#fff',4,15);spawnSW(t.x,t.y,TCFG[t.type].c1,50)}
    if(TCFG[t.type].explode)setTimeout(function(){explode(t.x,t.y,95)},100);

  document.getElementById('riDesc').textContent=rm.desc;
  var lc=document.getElementById('riLevels');lc.innerHTML='';
  var maxL=rm.levels===999?Math.max(5,save.bestEndless||5):rm.levels;
  for(var i=1;i<=maxL;i++){
    var s=getLevelStars(ri,i);var isBoss=(i===ROOM_LEVELS&&ri<5);
    var dot=document.createElement('div');dot.className='lvl-dot'+(s>0?' done':'')+(isBoss?' boss':'');
    dot.style.background=s>0?rm.color+'66':rm.color+'22';
    dot.textContent=s>0?(s>=3?'\u2605':s>=2?'\u2605':s):i;
    (function(lv){dot.onclick=function(){curLevel=lv;hideAll();startLevel()}})(i);
    lc.appendChild(dot);
  }
  document.getElementById('roomIntro').style.display='flex';state='roomintro';
}
function hideAll(){['menuS','mapS','roomIntro','lcS','goS','bossClr'].forEach(function(id){document.getElementById(id).style.display='none'})}
function startLevel(){hideAll();loadLevel(curRoom,curLevel);lastTime=performance.now();requestAnimationFrame(gameLoop)}
function startGame(){initAudio();curRoom=0;curLevel=1;score=0;startLevel()}
function nextLvl(){hideAll();
  if(curRoom<5){
    curLevel++;
    if(curLevel>ROOMS[curRoom].levels){curRoom++;curLevel=1;if(!isRoomUnlocked(curRoom)){showMap();return}}
  } else {curLevel++;if(curLevel>save.bestEndless)save.bestEndless=curLevel;doSave()}
  startLevel()
}
function bossNext(){hideAll();if(curRoom<4){curRoom++;curLevel=1;showRoomIntro(curRoom)}else if(curRoom===4){curRoom=5;curLevel=1;showRoomIntro(5)}else showMap()}
function retryLvl(){hideAll();startLevel()}
function goToMap(){hideAll();showMap()}

function getPos(e){var rect=c.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return {x:(src.clientX-rect.left)*(WW/rect.width),y:(src.clientY-rect.top)*(HH/rect.height)}}
c.addEventListener('mousemove',function(e){if(state==='idle'||state==='aiming'){aimEnd=getPos(e);state='aiming'}});
c.addEventListener('click',function(e){if(state==='idle'||state==='aiming'){aimEnd=getPos(e);shoot()}});
c.addEventListener('touchstart',function(e){e.preventDefault();initAudio();if(state==='idle'||state==='aiming'){aimEnd=getPos(e);state='aiming'}},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();if(state==='aiming')aimEnd=getPos(e)},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();if(state==='aiming')shoot()},{passive:false});

document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('mapBtn').addEventListener('click',showMap);
document.getElementById('mapBack').addEventListener('click',function(){hideAll();document.getElementById('menuS').style.display='flex';state='menu'});
document.getElementById('riPlay').addEventListener('click',function(){curLevel=1;startLevel()});
document.getElementById('nxBtn').addEventListener('click',nextLvl);
document.getElementById('bcNext').addEventListener('click',bossNext);
document.getElementById('bcMap').addEventListener('click',goToMap);
document.getElementById('rtBtn').addEventListener('click',retryLvl);
document.getElementById('rsBtn').addEventListener('click',goToMap);

['multi','slow','magnet'].forEach(function(id){var btn=document.getElementById('pu-'+id);btn.addEventListener('click',function(e){e.stopPropagation();initAudio();if(state!=='idle'&&state!=='aiming')return;activePU=activePU===id?null:id;document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('on')});if(activePU)btn.classList.add('on');tone(activePU?880:440,0.05,'sine',0.04)})});

function updateMenu(){var ms=document.getElementById('menuStats');ms.innerHTML='High Score: '+save.hs+' | Total Stars: '+save.totalStars+'<br>'+fakeOnline.toLocaleString()+' playing now'}
updateMenu();

function resize(){var wr=document.getElementById('W');var s=Math.min(window.innerWidth/400,window.innerHeight/750);wr.style.transform='scale('+s+')';wr.style.transformOrigin='top center';wr.style.marginTop=Math.max(0,(window.innerHeight-750*s)/2)+'px'}
window.addEventListener('resize',resize);resize();
</script></body></html>
