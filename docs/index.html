<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ricochet Lab: Chain Reactor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none;-webkit-user-select:none}
#W{position:relative;width:400px;height:750px;margin:auto}
canvas{display:block;border-radius:12px}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none;z-index:10}
.sb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px 10px;color:#fff;font-size:11px;text-align:center;backdrop-filter:blur(4px)}
.sl{color:#666;font-size:8px;text-transform:uppercase;letter-spacing:1px}
.sv{font-size:16px;font-weight:800}
#combo{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.15s}
#screenFlash{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:25;opacity:0;border-radius:12px;transition:opacity 0.15s}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(5,5,16,0.94);border-radius:12px;z-index:30;padding:28px}
.btn{padding:13px 40px;border-radius:40px;border:none;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform 0.1s;margin:5px}
.btn:active{transform:scale(0.95)}
.bp{background:linear-gradient(135deg,#7048e8,#3a85ff);color:#fff;box-shadow:0 4px 24px rgba(112,72,232,0.5)}
.bs{background:rgba(255,255,255,0.06);color:#888;border:1px solid rgba(255,255,255,0.1)}
#pbar{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.pb{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;pointer-events:all}
.pb:active{transform:scale(0.9)}
.pb.on{background:rgba(112,72,232,0.35);border-color:#7048e8;box-shadow:0 0 12px rgba(112,72,232,0.6)}
.scb{font-size:24px;color:#7888ff;margin:6px 0 16px;font-weight:700}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.2);font-size:10px;pointer-events:none;letter-spacing:1px}
#lvlB{position:absolute;top:72px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:800;color:#fff;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.3s;text-shadow:0 0 15px rgba(120,136,255,0.5)}
#streak{position:absolute;top:62px;right:14px;color:#ffeb3b;font-size:11px;font-weight:700;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.3s}
#dailyBadge{position:absolute;top:62px;left:14px;color:#7888ff;font-size:10px;pointer-events:none;z-index:10;letter-spacing:1px}
.perfect-burst{animation:pburst 0.6s ease-out}
@keyframes pburst{0%{transform:translate(-50%,-50%) scale(0.5);opacity:1}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
</style>
</head>
<body>
<div id="W">
<canvas id="c" width="400" height="750"></canvas>
<div id="screenFlash"></div>
<div id="ui">
<div class="sb"><div class="sl">Score</div><div class="sv" id="sV">0</div></div>
<div class="sb" style="min-width:65px"><div class="sl">Level</div><div class="sv" id="lV">1</div></div>
<div class="sb"><div class="sl">Shots</div><div class="sv" id="shV">3</div></div>
</div>
<div id="combo"></div>
<div id="lvlB"></div>
<div id="streak"></div>
<div id="dailyBadge"></div>
<div id="pbar">
<div class="pb" id="pu-multi" title="Multi Ball">&#x1F535;</div>
<div class="pb" id="pu-slow" title="Slow Mo">&#x23F3;</div>
<div class="pb" id="pu-magnet" title="Magnet">&#x1F9F2;</div>
</div>
<div id="hint">AIM &bull; SHOOT &bull; CHAIN REACT</div>
<div class="overlay" id="menuS" style="display:flex">
<h1 style="font-size:32px;font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 40px #7048e8">&#x1F52C; RICOCHET LAB</h1>
<div style="color:#7888ff;font-size:12px;margin:6px 0 16px;letter-spacing:2px">CHAIN REACTOR</div>
<div style="color:#666;font-size:11px;text-align:center;margin-bottom:16px;line-height:1.8">
Aim &#x2192; Shoot &#x2192; Bounce &#x2192; Destroy<br>Chain reactions &#x2022; Combos &#x2022; Endless
</div>
<div id="menuStats" style="color:#555;font-size:11px;margin-bottom:14px"></div>
<button class="btn bp" id="playBtn">&#x25B6; PLAY</button>
<button class="btn bs" id="dailyBtn" style="margin-top:4px">&#x1F525; DAILY CHALLENGE</button>
</div>
<div class="overlay" id="lcS">
<h1 id="lcT" style="font-size:28px;font-weight:900"></h1>
<div id="lcSt" style="font-size:40px;margin:8px 0"></div>
<div class="scb" id="lcSc"></div>
<div id="lcExtra" style="color:#888;font-size:11px;margin-bottom:10px"></div>
<button class="btn bp" id="nxBtn">NEXT &#x25B6;</button>
</div>
<div class="overlay" id="goS">
<h1 id="goTitle" style="font-size:28px;font-weight:900;color:#ff5252">GAME OVER</h1>
<div id="goRemain" style="font-size:50px;margin:10px 0"></div>
<div id="goMsg" style="color:#888;font-size:13px;margin-bottom:8px"></div>
<div class="scb" id="goSc"></div>
<button class="btn bp" id="rtBtn">TAP TO RETRY</button>
<button class="btn bs" id="rsBtn" style="margin-top:4px;font-size:12px">RESTART</button>
</div>
</div><script>
// ===== AUDIO =====
var AC=null;
function initAudio(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,d,t,v,det){if(!AC)return;try{var o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;if(det)o.detune.value=det;g.gain.setValueAtTime(v||0.12,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(d||0.2));o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+(d||0.2))}catch(e){}}
function sndBounce(){tone(600+Math.random()*600,0.06,'square',0.04)}
function sndHit(){tone(300,0.12,'sawtooth',0.1);tone(150,0.18,'sine',0.06)}
function sndExplode(){tone(80,0.35,'sawtooth',0.18);tone(60,0.45,'sine',0.12);tone(200,0.12,'square',0.08)}
function sndCombo(n){for(var i=0;i<Math.min(n,8);i++)setTimeout(function(j){tone(440*Math.pow(1.15,j),0.1,'sine',0.1)},i*50,i)}
function sndPerfect(){for(var i=0;i<10;i++)setTimeout(function(j){tone(523*Math.pow(1.1,j),0.18,'sine',0.08+j*0.005)},j*70,i)}
function sndShatter(){for(var i=0;i<6;i++)setTimeout(function(){tone(1500+Math.random()*4000,0.04,'square',0.03)},i*15)}
function sndFail(){tone(180,0.25,'sawtooth',0.08);setTimeout(function(){tone(130,0.35,'sawtooth',0.06)},120)}
function sndShoot(){tone(500,0.08,'sine',0.08);tone(800,0.06,'square',0.04)}
function sndLevelUp(){tone(523,0.12,'sine',0.1);setTimeout(function(){tone(659,0.12,'sine',0.1)},100);setTimeout(function(){tone(784,0.15,'sine',0.12)},200)}

// ===== SAVE SYSTEM =====
var save={hs:0,coins:0,streak:0,lastDay:'',totalGames:0,bestLevel:0,skin:'default',achievements:[]};
function loadSave(){try{var s=localStorage.getItem('rl_save');if(s)save=JSON.parse(s)}catch(e){}}
function saveSave(){try{localStorage.setItem('rl_save',JSON.stringify(save))}catch(e){}}
loadSave();

function checkStreak(){
  var today=new Date().toISOString().split('T')[0];
  if(save.lastDay===today)return;
  var yd=new Date();yd.setDate(yd.getDate()-1);
  var yesterday=yd.toISOString().split('T')[0];
  if(save.lastDay===yesterday){save.streak++}else if(save.lastDay!==today){save.streak=1}
  save.lastDay=today;saveSave();
}
checkStreak();

// ===== CORE =====
var c=document.getElementById('c'),ctx=c.getContext('2d'),W=400,H=750;
var state='menu',score=0,combo=0,level=1,shots=0,maxShots=3;
var activePU=null,particles=[],shards=[],shockwaves=[],balls=[],targets=[],portals=[],walls=[];
var aimEnd=null,slowFactor=1,shake=0,floaters=[],levelCleared=false,levelScore=0;
var BALL_R=8,BALL_SPEED=11,MAX_BOUNCES=18;
var slowMoReplay=false,replayTimer=0;
var isDaily=false,dailySeed=0;
var fakeOnline=Math.floor(1200+Math.random()*8000);
setInterval(function(){fakeOnline+=Math.floor(Math.random()*50-20);fakeOnline=Math.max(800,fakeOnline)},5000);

var TCFG={
  normal:   {hp:1,r:18,pts:10, c1:'#4fc3f7',c2:'#0288d1',glow:'#4fc3f788'},
  hard:     {hp:2,r:20,pts:25, c1:'#ff7043',c2:'#d84315',glow:'#ff704388'},
  crystal:  {hp:1,r:20,pts:50, c1:'#e0f7fa',c2:'#80deea',glow:'#80deea88',shatter:1},
  explosive:{hp:1,r:20,pts:75, c1:'#ff6f00',c2:'#e65100',glow:'#ff6f0088',explode:1},
  moving:   {hp:1,r:18,pts:30, c1:'#ab47bc',c2:'#7b1fa2',glow:'#ab47bc88'},
  ghost:    {hp:1,r:18,pts:60, c1:'#b0bec5',c2:'#78909c',glow:'#b0bec544'},
  blackhole:{hp:3,r:24,pts:150,c1:'#311b92',c2:'#000',glow:'#9c27b066'}
};

// Show menu stats
function updateMenu(){
  var ms=document.getElementById('menuStats');
  ms.innerHTML='Best: Level '+save.bestLevel+' | High Score: '+save.hs+'<br>'+fakeOnline.toLocaleString()+' playing now';
  var sk=document.getElementById('streak');
  if(save.streak>1){sk.textContent=save.streak+' DAY STREAK \u{1F525}';sk.style.opacity=1}
  document.getElementById('dailyBadge').textContent='';
}
updateMenu();
// ===== PROCEDURAL LEVEL GENERATOR =====
function seededRand(seed){var x=Math.sin(seed)*10000;return x-Math.floor(x)}
function genLevel(n){
  var diff=Math.min(n/5,8);
  var numT=Math.min(3+Math.floor(n*0.55),14);
  var numS=Math.max(1,Math.ceil(numT/3)-Math.floor(diff/4));
  if(n<=2)numS=3;if(n<=1)numT=3;
  var tgts=[],types=['normal'];
  if(n>=3)types.push('hard');
  if(n>=5)types.push('explosive');
  if(n>=7)types.push('crystal');
  if(n>=10)types.push('moving');
  if(n>=15)types.push('ghost');
  if(n>=20&&n%5===0)types.push('blackhole');
  var rows=Math.ceil(numT/4),placed=0;
  for(var row=0;row<rows&&placed<numT;row++){
    var cols=Math.min(numT-placed,3+Math.floor(Math.random()*2));
    var sp=W/(cols+1);
    var yB=130+row*75+Math.random()*15;
    for(var col=0;col<cols&&placed<numT;col++){
      var tx=sp*(col+1)+Math.random()*25-12;
      var ty=yB+Math.random()*15-7;
      tx=Math.max(30,Math.min(W-30,tx));ty=Math.max(95,Math.min(H-200,ty));
      var type=types[Math.floor(Math.random()*types.length)];
      if(placed===0&&n<=3)type='normal';
      var t={x:tx,y:ty,type:type};
      if(type==='moving')t.dx=(Math.random()>0.5?1:-1)*(0.7+Math.random()*0.8);
      tgts.push(t);placed++;
    }
  }
  if(n>=6&&Math.random()<0.35){var ei=Math.floor(Math.random()*tgts.length);tgts[ei].type='explosive'}
  var pts=[];
  if(n>=8&&Math.random()<0.25+diff*0.04){
    var py=140+Math.random()*(H-360);
    pts.push({ax:35,ay:py,bx:W-35,by:py+Math.random()*80-40});
  }
  var wls=[];
  if(n>=12&&Math.random()<0.25){
    var wy=190+Math.random()*(H-400);
    wls.push({x:60+Math.random()*(W-180),y:wy,w:70+Math.random()*50,h:5});
  }
  return {shots:numS,targets:tgts,portals:pts,walls:wls};
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function spawnP(x,y,count,color,speed,life){
  speed=speed||4;life=life||40;
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2,s=speed*(0.3+Math.random());
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,ml:life,color:color,r:2+Math.random()*4,glow:Math.random()>0.4});
  }
}
function spawnShards(x,y,color,count){
  count=count||12;sndShatter();
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2+Math.random()*0.4,s=3+Math.random()*7;
    shards.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:50,ml:50,color:color,angle:Math.random()*Math.PI,spin:(Math.random()-0.5)*0.4,w:3+Math.random()*8,h:2+Math.random()*4});
  }
}
function spawnShockwave(x,y,color,maxR){
  shockwaves.push({x:x,y:y,r:8,maxR:maxR||120,color:color||'#fff',life:18,ml:18});
}
function screenFlash(color){
  var el=document.getElementById('screenFlash');
  el.style.background=color;el.style.opacity=0.4;
  setTimeout(function(){el.style.opacity=0},100);
}
function doShake(a){shake=Math.max(shake,a)}
function showFloat(text,x,y,color,size){
  floaters.push({text:text,x:x,y:y,color:color||'#fff',size:size||20,life:50,ml:50,vy:-2.2});
}
function flashCombo(c){
  var el=document.getElementById('combo');
  var cols=['#fff','#ffeb3b','#ff9800','#ff5722','#e91e63','#aa00ff','#00e5ff'];
  var col=cols[Math.min(c-1,cols.length-1)];
  var labels=['','HIT!','DOUBLE!','TRIPLE!','QUAKE!','INSANE!','GODLIKE!','LEGENDARY!'];
  el.textContent=c>=2?(labels[Math.min(c,labels.length-1)]||('x'+c+'!')):'';
  el.style.color=col;el.style.opacity=1;el.style.fontSize=Math.min(18+c*7,62)+'px';
  el.style.textShadow='0 0 '+Math.min(20+c*10,70)+'px '+col;
  setTimeout(function(){el.style.opacity=0},700);
  sndCombo(c);
  if(c>=3){doShake(c*2.5);screenFlash(col)}
  if(c>=4)spawnShockwave(W/2,H/2,col,220);
  if(c>=5)spawnP(W/2,H/2,50,col,9,30);
}
function explode(x,y,radius){
  radius=radius||90;sndExplode();
  spawnShockwave(x,y,'#ff6f00',radius*1.4);
  spawnP(x,y,35,'#ff6f00',8,45);spawnP(x,y,25,'#ffcc02',6,35);spawnP(x,y,15,'#fff',10,18);
  screenFlash('#ff6f00');doShake(12);
  targets.forEach(function(t){if(t.alive&&dist(t,{x:x,y:y})<radius+t.r)damageTarget(t,x,y)});
}
function damageTarget(t){
  if(!t.alive)return;t.hp--;t.flash=10;
  spawnP(t.x,t.y,10,TCFG[t.type].c1,4,22);
  if(t.hp<=0){
    t.alive=false;var earned=t.pts*Math.max(1,combo);
    score+=earned;levelScore+=earned;combo++;flashCombo(combo);
    showFloat('+'+earned,t.x,t.y-15,'#ffeb3b',16+Math.min(combo*2,18));sndHit();
    if(TCFG[t.type].shatter){spawnShards(t.x,t.y,TCFG[t.type].c1,18);spawnShockwave(t.x,t.y,TCFG[t.type].c1,80)}
    else{spawnP(t.x,t.y,28,TCFG[t.type].c1,7,40);spawnP(t.x,t.y,15,'#fff',5,18);spawnShockwave(t.x,t.y,TCFG[t.type].c1,55)}
    if(TCFG[t.type].explode)setTimeout(function(){explode(t.x,t.y,100)},100);
    if(t.type==='ghost'&&Math.random()<0.35){
      setTimeout(function(){t.alive=true;t.hp=1;t.flash=0;
        t.x=Math.max(30,Math.min(W-30,t.x+Math.random()*80-40));
        t.y=Math.max(95,Math.min(H-200,t.y+Math.random()*60-30))},500);
    }
    doShake(5);updateUI();
  }
}
function loadLevel(idx){
  var def=genLevel(idx);maxShots=def.shots;shots=maxShots;levelScore=0;
  targets=def.targets.map(function(t,i){var cfg=TCFG[t.type];
    return {id:i,x:t.x,y:t.y,type:t.type,hp:cfg.hp,maxHp:cfg.hp,r:cfg.r,pts:cfg.pts,color:cfg.c1,dx:t.dx||0,alive:true,flash:0,pulse:Math.random()*Math.PI*2}});
  portals=(def.portals||[]).map(function(p){return {ax:p.ax,ay:p.ay,bx:p.bx,by:p.by,r:14,angle:0}});
  walls=def.walls||[];
  particles=[];shards=[];shockwaves=[];balls=[];floaters=[];combo=0;levelCleared=false;state='idle';
  activePU=null;slowFactor=1;slowMoReplay=false;
  document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('on')});
  updateUI();document.getElementById('lV').textContent=idx;
  var bn=document.getElementById('lvlB');
  bn.textContent='LEVEL '+idx;bn.style.opacity=1;
  setTimeout(function(){bn.style.opacity=0},1200);
}
function updateUI(){document.getElementById('sV').textContent=score;document.getElementById('shV').textContent=shots}

function getAimVec(){
  if(!aimEnd)return null;var sx=W/2,sy=H-70;
  var dx=aimEnd.x-sx,dy=aimEnd.y-sy,len=Math.hypot(dx,dy);
  if(len<5)return null;return {vx:(dx/len)*BALL_SPEED,vy:(dy/len)*BALL_SPEED};
}
function shoot(){
  if(shots<=0||(state!=='idle'&&state!=='aiming'))return;
  var av=getAimVec();if(!av){state='idle';return}
  initAudio();sndShoot();shots--;updateUI();state='shooting';
  var count=activePU==='multi'?3:1;
  for(var i=0;i<count;i++){var spread=(i-(count-1)/2)*0.2;
    balls.push({x:W/2,y:H-70,vx:av.vx*Math.cos(spread)-av.vy*Math.sin(spread),vy:av.vx*Math.sin(spread)+av.vy*Math.cos(spread),bounces:0,dead:false,trail:[],inPortal:0,born:Date.now()})}
  if(activePU==='slow')slowFactor=0.22;
  spawnP(W/2,H-70,14,'#7888ff',5,12);combo=0;aimEnd=null;
}
function stepBall(b,dt){
  if(activePU==='magnet'){targets.forEach(function(t){if(!t.alive)return;var d=dist(b,t);if(d<140&&d>1){b.vx+=(t.x-b.x)/d*0.5;b.vy+=(t.y-b.y)/d*0.5}})}
  targets.forEach(function(t){if(!t.alive||t.type!=='blackhole')return;var d=dist(b,t);if(d<200&&d>1){b.vx+=(t.x-b.x)/d*1.5;b.vy+=(t.y-b.y)/d*1.5}});
  b.x+=b.vx*dt;b.y+=b.vy*dt;
  b.trail.push({x:b.x,y:b.y});if(b.trail.length>28)b.trail.shift();
  if(b.x-BALL_R<0){b.x=BALL_R;b.vx=Math.abs(b.vx);b.bounces++;sndBounce();spawnP(b.x,b.y,4,'#7888ff',2,10)}
  if(b.x+BALL_R>W){b.x=W-BALL_R;b.vx=-Math.abs(b.vx);b.bounces++;sndBounce();spawnP(b.x,b.y,4,'#7888ff',2,10)}
  if(b.y-BALL_R<55){b.y=55+BALL_R;b.vy=Math.abs(b.vy);b.bounces++;sndBounce();spawnP(b.x,b.y,4,'#7888ff',2,10)}
  if(b.y+BALL_R>H-35){b.y=H-35-BALL_R;b.vy=-Math.abs(b.vy);b.bounces++;sndBounce();spawnP(b.x,b.y,4,'#7888ff',2,10)}
  portals.forEach(function(p){
    if(dist(b,{x:p.ax,y:p.ay})<p.r+BALL_R&&!b.inPortal){b.x=p.bx;b.y=p.by;b.inPortal=50;spawnP(p.bx,p.by,14,'#7048e8',6,18);spawnShockwave(p.bx,p.by,'#7048e8',45);tone(1200,0.12,'sine',0.06)}
    else if(dist(b,{x:p.bx,y:p.by})<p.r+BALL_R&&!b.inPortal){b.x=p.ax;b.y=p.ay;b.inPortal=50;spawnP(p.ax,p.ay,14,'#3a85ff',6,18);spawnShockwave(p.ax,p.ay,'#3a85ff',45);tone(1200,0.12,'sine',0.06)}
    if(b.inPortal>0)b.inPortal--});
  walls.forEach(function(w){if(b.x+BALL_R>w.x&&b.x-BALL_R<w.x+w.w&&b.y+BALL_R>w.y&&b.y-BALL_R<w.y+w.h){
    if(b.vy>0)b.y=w.y-BALL_R;else b.y=w.y+w.h+BALL_R;b.vy=-b.vy;b.bounces++;sndBounce();spawnP(b.x,b.y,5,'#90a4ae',3,12)}});
  targets.forEach(function(t){if(t.alive&&dist(b,t)<BALL_R+t.r){
    damageTarget(t);var d=dist(b,t);if(d<1)d=1;var nx=(b.x-t.x)/d,ny=(b.y-t.y)/d;var dot=b.vx*nx+b.vy*ny;
    b.vx-=2*dot*nx;b.vy-=2*dot*ny;b.x=t.x+nx*(BALL_R+t.r+1);b.y=t.y+ny*(BALL_R+t.r+1);b.bounces++}});
  if(b.bounces>=MAX_BOUNCES||(Date.now()-b.born>6000))b.dead=true;
}
function drawBG(now){
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#080818');bg.addColorStop(0.5,'#0a0a24');bg.addColorStop(1,'#060614');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(120,136,255,0.025)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=35){ctx.beginPath();ctx.moveTo(x,55);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=55;y<H;y+=35){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  var t=now*0.001;
  ctx.fillStyle='rgba(120,136,255,0.06)';
  for(var i=0;i<8;i++){var ax=W/2+Math.sin(t+i*0.9)*160,ay=H/2+Math.cos(t*0.6+i*0.7)*220;
    ctx.beginPath();ctx.arc(ax,ay,Math.max(1,1.5+Math.sin(t+i)*1),0,Math.PI*2);ctx.fill()}
  // Launcher
  ctx.fillStyle='rgba(112,72,232,0.12)';ctx.beginPath();ctx.arc(W/2,H-70,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(112,72,232,0.45)';ctx.beginPath();ctx.arc(W/2,H-70,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(W/2,H-70,4,0,Math.PI*2);ctx.fill();
}
function drawTarget(t,now){
  if(!t.alive)return;var cfg=TCFG[t.type];
  t.pulse=(t.pulse||0)+0.05;var pr=1+Math.sin(t.pulse)*0.05;var r=t.r*pr;
  // Neon glow
  var g1=ctx.createRadialGradient(t.x,t.y,r*0.4,t.x,t.y,r*2.2);
  g1.addColorStop(0,cfg.glow);g1.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(t.x,t.y,r*2.2,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  // Hit flash
  if(t.flash>0){t.flash--;ctx.fillStyle='rgba(255,255,255,'+(t.flash/10*0.7)+')';
    ctx.beginPath();ctx.arc(t.x,t.y,r*1.6,0,Math.PI*2);ctx.fill()}
  // Body
  var g2=ctx.createRadialGradient(t.x-r*0.2,t.y-r*0.2,0,t.x,t.y,r);
  g2.addColorStop(0,cfg.c1);g2.addColorStop(1,cfg.c2);
  ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.arc(t.x-r*0.18,t.y-r*0.22,r*0.3,0,Math.PI*2);ctx.fill();
  // Type specifics
  if(t.type==='hard'){ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t.hp,t.x,t.y)}
  if(t.type==='explosive'){ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',t.x,t.y+1)}
  if(t.type==='crystal'){var sa=now*0.005;
    for(var i=0;i<4;i++){var sx=t.x+Math.cos(sa+i*1.57)*r*0.55,sy=t.y+Math.sin(sa+i*1.57)*r*0.55;
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(sx,sy,1.2,0,Math.PI*2);ctx.fill()}}
  if(t.type==='ghost'){ctx.globalAlpha=0.45+Math.sin(now*0.004)*0.2;
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',t.x,t.y);ctx.globalAlpha=1}
  if(t.type==='blackhole'){ctx.strokeStyle='rgba(156,39,176,0.35)';ctx.lineWidth=1.5;
    for(var j=0;j<3;j++){ctx.beginPath();ctx.arc(t.x,t.y,r+3+j*5,now*0.003+j*2,now*0.003+j*2+Math.PI);ctx.stroke()}}
  if(t.type==='moving'){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.dx>0?'>>':'<<',t.x,t.y)}
}
var lastTime=0;
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  if(state==='menu'||state==='levelcomplete'||state==='gameover')return;
  var rawDt=(now-lastTime)/16;lastTime=now;
  var ef=slowMoReplay?0.15:slowFactor;
  var dt=Math.min(rawDt,3)*ef;
  if(!slowMoReplay&&slowFactor<1)slowFactor=Math.min(1,slowFactor+0.004);

  var sx=0,sy=0;
  if(shake>0.3){sx=(Math.random()-0.5)*shake*2.5;sy=(Math.random()-0.5)*shake*2.5;shake*=0.82}
  ctx.save();ctx.translate(sx,sy);
  drawBG(now);

  // Walls
  walls.forEach(function(w){
    var wg=ctx.createLinearGradient(w.x,w.y,w.x+w.w,w.y);
    wg.addColorStop(0,'#37474f');wg.addColorStop(0.5,'#607d8b');wg.addColorStop(1,'#37474f');
    ctx.fillStyle=wg;ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.shadowColor='#607d8b';ctx.shadowBlur=6;ctx.fillRect(w.x,w.y,w.w,w.h);ctx.shadowBlur=0;
  });

  // Portals
  portals.forEach(function(p){
    p.angle=now*0.003;
    [[p.ax,p.ay,'#7048e8','#9c27b0'],[p.bx,p.by,'#3a85ff','#00bcd4']].forEach(function(pp){
      var pg=ctx.createRadialGradient(pp[0],pp[1],0,pp[0],pp[1],p.r*2);
      pg.addColorStop(0,pp[2]+'44');pg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(pp[0],pp[1],p.r*2,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
      ctx.strokeStyle=pp[2];ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(pp[0],pp[1],p.r,p.angle,p.angle+Math.PI*1.5);ctx.stroke();
      ctx.strokeStyle=pp[3];ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(pp[0],pp[1],Math.max(1,p.r*0.5),p.angle+Math.PI,p.angle+Math.PI*2);ctx.stroke();
      ctx.fillStyle=pp[2];ctx.beginPath();ctx.arc(pp[0],pp[1],2.5,0,Math.PI*2);ctx.fill();
    });
  });

  // Targets
  targets.forEach(function(t){
    if(t.type==='moving'&&t.alive){t.x+=t.dx*dt;if(t.x<t.r+8||t.x>W-t.r-8)t.dx=-t.dx}
    drawTarget(t,now);
  });

  // Aim line
  if((state==='idle'||state==='aiming')&&aimEnd){
    var av=getAimVec();
    if(av){ctx.shadowColor='#7888ff';ctx.shadowBlur=6;ctx.setLineDash([4,7]);ctx.strokeStyle='rgba(120,136,255,0.35)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(W/2,H-70);ctx.lineTo(W/2+av.vx*24,H-70+av.vy*24);ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;
      ctx.fillStyle='rgba(120,136,255,0.6)';ctx.beginPath();ctx.arc(W/2+av.vx*24,H-70+av.vy*24,3.5,0,Math.PI*2);ctx.fill();}
  }

  // Balls
  balls.forEach(function(b){if(!b.dead){stepBall(b,dt);
    for(var i=1;i<b.trail.length;i++){var alpha=(i/b.trail.length)*0.45;var tr=Math.max(1,BALL_R*(i/b.trail.length)*0.75);
      ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,tr,0,Math.PI*2);ctx.fillStyle='rgba(120,136,255,'+alpha+')';ctx.fill()}
    ctx.shadowColor='#7888ff';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);
    var bg=ctx.createRadialGradient(b.x-2,b.y-2,0,b.x,b.y,BALL_R);bg.addColorStop(0,'#fff');bg.addColorStop(0.6,'#c5cae9');bg.addColorStop(1,'#7888ff');
    ctx.fillStyle=bg;ctx.fill();ctx.shadowBlur=0}});

  // Particles
  particles=particles.filter(function(p){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.04*dt;p.life-=dt;
    var alpha=p.life/p.ml;var r=Math.max(0.5,p.r*alpha);
    if(p.glow){ctx.shadowColor=p.color;ctx.shadowBlur=6}
    ctx.globalAlpha=alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;return p.life>0});

  // Shards
  shards=shards.filter(function(s){s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=0.18*dt;s.life-=dt;s.angle+=s.spin*dt;
    var alpha=s.life/s.ml;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);ctx.globalAlpha=alpha;
    ctx.fillStyle=s.color;ctx.fillRect(-s.w/2,-s.h/2,s.w,s.h);
    ctx.fillStyle='rgba(255,255,255,'+alpha*0.35+')';ctx.fillRect(-s.w/2,-s.h/2,s.w*0.3,s.h*0.3);
    ctx.restore();ctx.globalAlpha=1;return s.life>0});

  // Shockwaves
  shockwaves=shockwaves.filter(function(sw){sw.life-=dt;sw.r+=(sw.maxR-sw.r)*0.14*dt;
    var alpha=sw.life/sw.ml*0.5;ctx.strokeStyle=sw.color;ctx.globalAlpha=alpha;ctx.lineWidth=2.5*(sw.life/sw.ml);
    ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;return sw.life>0});

  // Floaters
  floaters=floaters.filter(function(f){f.y+=f.vy;f.life--;var alpha=f.life/f.ml;
    ctx.globalAlpha=alpha;ctx.shadowColor=f.color;ctx.shadowBlur=8;
    ctx.font='bold '+f.size+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle=f.color;ctx.fillText(f.text,f.x,f.y);
    ctx.shadowBlur=0;ctx.globalAlpha=1;return f.life>0});

  // Slow-mo overlay text
  if(slowMoReplay){
    ctx.globalAlpha=0.4+Math.sin(now*0.008)*0.15;
    ctx.font='bold 14px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#ff5252';
    ctx.fillText('SO CLOSE...',W/2,H/2-20);ctx.globalAlpha=1;
    replayTimer--;if(replayTimer<=0){slowMoReplay=false;setTimeout(showGO,200)}
  }

  ctx.restore();

  // Check level clear
  var alive=targets.filter(function(t){return t.alive}).length;
  if(state==='shooting'&&alive===0&&!levelCleared){levelCleared=true;setTimeout(showLC,450)}
  // Check all balls dead
  if(state==='shooting'&&balls.length>0&&balls.every(function(b){return b.dead})){
    balls=[];
    if(!levelCleared){
      if(shots<=0){
        // "TUH BE" slow-mo effect
        var remaining=targets.filter(function(t){return t.alive}).length;
        if(remaining<=2&&remaining>0){
          slowMoReplay=true;replayTimer=80;
          // Highlight remaining targets
          targets.forEach(function(t){if(t.alive)spawnShockwave(t.x,t.y,'#ff5252',50)});
        } else {setTimeout(showGO,400)}
      } else state='idle';
    }
  }
}
function showLC(){
  var stars=shots>=maxShots?3:shots>=1?2:1;
  var totalT=targets.length;
  var usedShots=maxShots-shots;
  var perfectShot=usedShots<=1&&totalT>=3;
  var st='';for(var i=0;i<3;i++)st+=i<stars?'\u2B50':'\u2606';

  if(perfectShot){
    // PERFECT SHOT celebration!
    document.getElementById('lcT').textContent='\u{1F4A5} PERFECT SHOT!';
    document.getElementById('lcT').style.color='#ffeb3b';
    screenFlash('#ffeb3b');doShake(15);sndPerfect();
    spawnP(W/2,H/2,60,'#ffeb3b',10,50);spawnP(W/2,H/2,40,'#ff9800',8,40);
    spawnShockwave(W/2,H/2,'#ffeb3b',250);
    var bonus=totalT*50;score+=bonus;levelScore+=bonus;
    document.getElementById('lcExtra').textContent='PERFECT BONUS: +'+bonus+' | Combo: x'+combo;
  } else if(stars===3){
    document.getElementById('lcT').textContent='\u2B50 PERFECT!';
    document.getElementById('lcT').style.color='#ffeb3b';
    sndLevelUp();
    document.getElementById('lcExtra').textContent='All shots saved!';
  } else {
    document.getElementById('lcT').textContent='LEVEL CLEARED!';
    document.getElementById('lcT').style.color='#fff';
    sndLevelUp();
    document.getElementById('lcExtra').textContent=combo>3?'Best combo: x'+combo:'';
  }

  document.getElementById('lcSc').textContent='Score: +'+levelScore;
  document.getElementById('lcSt').textContent=st;
  document.getElementById('lcS').style.display='flex';
  state='levelcomplete';

  // Save progress
  if(score>save.hs)save.hs=score;
  if(level>save.bestLevel)save.bestLevel=level;
  save.totalGames++;saveSave();
}

function showGO(){
  sndFail();
  var alive=targets.filter(function(t){return t.alive}).length;
  var total=targets.length;
  var pct=Math.round((1-alive/total)*100);

  // "TUH BE" messaging based on how close they were
  if(alive===1){
    document.getElementById('goTitle').textContent='SO CLOSE!';
    document.getElementById('goTitle').style.color='#ff9800';
    document.getElementById('goRemain').textContent='1';
    document.getElementById('goMsg').textContent='Just ONE target left! You almost had it!';
  } else if(alive===2){
    document.getElementById('goTitle').textContent='ALMOST!';
    document.getElementById('goTitle').style.color='#ff7043';
    document.getElementById('goRemain').textContent=alive+'';
    document.getElementById('goMsg').textContent='Only '+alive+' left! So frustrating!';
  } else if(pct>=60){
    document.getElementById('goTitle').textContent='NICE TRY!';
    document.getElementById('goTitle').style.color='#ff5252';
    document.getElementById('goRemain').textContent=alive+'';
    document.getElementById('goMsg').textContent=pct+'% destroyed! You can do better!';
  } else {
    document.getElementById('goTitle').textContent='GAME OVER';
    document.getElementById('goTitle').style.color='#ff5252';
    document.getElementById('goRemain').textContent='';
    document.getElementById('goMsg').textContent='Try a different angle!';
  }

  document.getElementById('goSc').textContent='Level '+level+' | Score: '+score;

  // Pulsate remaining targets
  targets.forEach(function(t){
    if(t.alive){spawnShockwave(t.x,t.y,'#ff5252',40);t.flash=20}
  });

  document.getElementById('goS').style.display='flex';
  state='gameover';
  save.totalGames++;saveSave();
}

function startGame(){
  initAudio();
  document.getElementById('menuS').style.display='none';
  document.getElementById('lcS').style.display='none';
  document.getElementById('goS').style.display='none';
  score=0;level=1;isDaily=false;loadLevel(1);
  lastTime=performance.now();requestAnimationFrame(gameLoop);
}
function startDaily(){
  initAudio();
  document.getElementById('menuS').style.display='none';
  score=0;level=1;isDaily=true;
  dailySeed=Math.floor(Date.now()/86400000);
  loadLevel(1);lastTime=performance.now();requestAnimationFrame(gameLoop);
  document.getElementById('dailyBadge').textContent='\u{1F525} DAILY CHALLENGE';
  document.getElementById('dailyBadge').style.opacity=1;
}
function nextLvl(){
  document.getElementById('lcS').style.display='none';
  level++;loadLevel(level);
}
function retryLvl(){document.getElementById('goS').style.display='none';loadLevel(level)}
function restartG(){document.getElementById('goS').style.display='none';score=0;level=1;loadLevel(1)}

function getPos(e){var rect=c.getBoundingClientRect();var src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-rect.left)*(W/rect.width),y:(src.clientY-rect.top)*(H/rect.height)}}

c.addEventListener('mousemove',function(e){if(state==='idle'||state==='aiming'){aimEnd=getPos(e);state='aiming'}});
c.addEventListener('click',function(e){if(state==='idle'||state==='aiming'){aimEnd=getPos(e);shoot()}});
c.addEventListener('touchstart',function(e){e.preventDefault();initAudio();
  if(state==='idle'||state==='aiming'){aimEnd=getPos(e);state='aiming'}},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();if(state==='aiming')aimEnd=getPos(e)},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();if(state==='aiming')shoot()},{passive:false});

document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('dailyBtn').addEventListener('click',startDaily);
document.getElementById('nxBtn').addEventListener('click',nextLvl);
document.getElementById('rtBtn').addEventListener('click',retryLvl);
document.getElementById('rsBtn').addEventListener('click',restartG);

['multi','slow','magnet'].forEach(function(id){
  var btn=document.getElementById('pu-'+id);
  btn.addEventListener('click',function(e){e.stopPropagation();initAudio();
    if(state!=='idle'&&state!=='aiming')return;
    activePU=activePU===id?null:id;
    document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('on')});
    if(activePU)btn.classList.add('on');tone(activePU?880:440,0.06,'sine',0.05)});
});

function resize(){var wr=document.getElementById('W');
  var s=Math.min(window.innerWidth/400,window.innerHeight/750);
  wr.style.transform='scale('+s+')';wr.style.transformOrigin='top center';
  wr.style.marginTop=Math.max(0,(window.innerHeight-750*s)/2)+'px'}
window.addEventListener('resize',resize);resize();
</script></body></html>
