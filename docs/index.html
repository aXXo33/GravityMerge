<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ricochet Lab: Chain Reactor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none}
#W{position:relative;width:400px;height:750px;margin:auto}
canvas{display:block;border-radius:12px}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none;z-index:10}
.sb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:5px 12px;color:#fff;font-size:11px;text-align:center;backdrop-filter:blur(4px)}
.sl{color:#888;font-size:9px;text-transform:uppercase;letter-spacing:1px}
.sv{font-size:17px;font-weight:800;color:#fff}
#combo{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.15s}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(5,5,16,0.94);border-radius:12px;z-index:30;padding:30px}
#overlay h1{font-size:34px;font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 40px #7048e8}
#overlay .sub{color:#7888ff;font-size:13px;margin:6px 0 20px;letter-spacing:2px}
.btn{padding:14px 44px;border-radius:40px;border:none;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform 0.12s;margin:5px}
.btn:active{transform:scale(0.96)}
.bp{background:linear-gradient(135deg,#7048e8,#3a85ff);color:#fff;box-shadow:0 4px 30px rgba(112,72,232,0.6)}
.bs{background:rgba(255,255,255,0.06);color:#999;border:1px solid rgba(255,255,255,0.12)}
#pbar{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:10}
.pb{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.12s,background 0.15s;pointer-events:all}
.pb:active{transform:scale(0.9)}
.pb.on{background:rgba(112,72,232,0.4);border-color:#7048e8;box-shadow:0 0 14px rgba(112,72,232,0.7)}
#lcS,#goS{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(5,5,16,0.94);border-radius:12px;z-index:30;padding:30px}
.scb{font-size:26px;color:#7888ff;margin:8px 0 18px;font-weight:700}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);font-size:11px;pointer-events:none;letter-spacing:1px}
#lvlBanner{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:800;color:#fff;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.3s;text-shadow:0 0 20px rgba(120,136,255,0.6)}
</style>
</head>
<body>
<div id="W">
<canvas id="c" width="400" height="750"></canvas>
<div id="ui">
<div class="sb"><div class="sl">Score</div><div class="sv" id="sV">0</div></div>
<div class="sb" style="min-width:70px"><div class="sl">Level</div><div class="sv" id="lV">1</div></div>
<div class="sb"><div class="sl">Shots</div><div class="sv" id="shV">3</div></div>
</div>
<div id="combo"></div>
<div id="lvlBanner"></div>
<div id="pbar">
<div class="pb" id="pu-multi" title="Multi Ball">&#x1F535;</div>
<div class="pb" id="pu-slow" title="Slow Mo">&#x23F3;</div>
<div class="pb" id="pu-magnet" title="Magnet">&#x1F9F2;</div>
</div>
<div id="hint">AIM &bull; SHOOT &bull; CHAIN REACT</div>
<div id="overlay">
<h1>&#x1F52C; RICOCHET LAB</h1>
<div class="sub">CHAIN REACTOR</div>
<div style="color:#777;font-size:12px;text-align:center;margin-bottom:20px;line-height:1.8">
Aim &#x2192; Shoot &#x2192; Bounce &#x2192; Destroy<br>Chain reactions &#x2022; Combos &#x2022; Endless levels
</div>
<button class="btn bp" id="playBtn">&#x25B6; PLAY</button>
</div>
<div id="lcS">
<h1 id="lcT" style="color:#fff;font-size:30px;font-weight:900"></h1>
<div id="lcSt" style="font-size:42px;margin:10px 0"></div>
<div class="scb" id="lcSc"></div>
<button class="btn bp" id="nxBtn">NEXT &#x25B6;</button>
</div>
<div id="goS">
<h1 style="color:#ff5252;font-size:30px;font-weight:900">GAME OVER</h1>
<div class="scb" id="goSc"></div>
<div id="goMsg" style="color:#888;font-size:13px;margin-bottom:16px"></div>
<button class="btn bp" id="rtBtn">RETRY</button>
<button class="btn bs" id="rsBtn" style="margin-top:6px">RESTART</button>
</div>
</div><script>
// ===== AUDIO ENGINE (Web Audio API) =====
var AC=null;
function initAudio(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function playTone(freq,dur,type,vol,detune){
  if(!AC)return;try{
  var o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=freq;if(detune)o.detune.value=detune;
  g.gain.setValueAtTime(vol||0.15,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(dur||0.2));
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+(dur||0.2));
  }catch(e){}
}
function sndBounce(){playTone(800+Math.random()*400,0.08,'square',0.06)}
function sndHit(){playTone(300,0.15,'sawtooth',0.12);playTone(150,0.2,'sine',0.08)}
function sndExplode(){playTone(80,0.4,'sawtooth',0.2);playTone(60,0.5,'sine',0.15);playTone(200,0.15,'square',0.1)}
function sndCombo(n){var base=440;for(var i=0;i<Math.min(n,6);i++)setTimeout(function(j){playTone(base*Math.pow(1.2,j),0.12,'sine',0.12)},i*60,i)}
function sndPerfect(){for(var i=0;i<8;i++)setTimeout(function(j){playTone(523*Math.pow(1.122,j),0.2,'sine',0.1+j*0.01)},j*80,i)}
function sndShatter(){for(var i=0;i<5;i++)setTimeout(function(){playTone(2000+Math.random()*3000,0.05,'square',0.04)},i*20)}
function sndFail(){playTone(200,0.3,'sawtooth',0.1);setTimeout(function(){playTone(150,0.4,'sawtooth',0.08)},150)}
function sndShoot(){playTone(600,0.1,'sine',0.1);playTone(900,0.08,'square',0.05)}

// ===== CORE SETUP =====
var c=document.getElementById('c'),ctx=c.getContext('2d'),W=400,H=750;
var state='menu',score=0,combo=0,level=1,shots=0,maxShots=3;
var activePU=null,particles=[],shards=[],shockwaves=[],balls=[],targets=[],portals=[],walls=[];
var aimEnd=null,slowFactor=1,shake=0,floaters=[],levelCleared=false,levelScore=0;
var BALL_R=8,BALL_SPEED=11,MAX_BOUNCES=18;

var TCFG={
  normal:   {hp:1,r:18,pts:10, c1:'#4fc3f7',c2:'#0288d1',glow:'#4fc3f788'},
  hard:     {hp:2,r:20,pts:25, c1:'#ff7043',c2:'#d84315',glow:'#ff704388'},
  crystal:  {hp:1,r:20,pts:50, c1:'#e0f7fa',c2:'#80deea',glow:'#80deea88',shatter:1},
  explosive:{hp:1,r:20,pts:75, c1:'#ff6f00',c2:'#e65100',glow:'#ff6f0088',explode:1},
  moving:   {hp:1,r:18,pts:30, c1:'#ab47bc',c2:'#7b1fa2',glow:'#ab47bc88'},
  ghost:    {hp:1,r:18,pts:60, c1:'#b0bec5',c2:'#78909c',glow:'#b0bec544'},
  blackhole:{hp:3,r:24,pts:150,c1:'#212121',c2:'#000',glow:'#9c27b088'}
};

// ===== PROCEDURAL LEVEL GENERATOR =====
function genLevel(n){
  var diff=Math.min(n/5,8);
  var numTargets=Math.min(3+Math.floor(n*0.6),14);
  var numShots=Math.max(1,Math.ceil(numTargets/3)-Math.floor(diff/4));
  if(n<=2) numShots=3;
  var tgts=[];
  var types=['normal'];
  if(n>=3) types.push('hard');
  if(n>=5) types.push('explosive');
  if(n>=7) types.push('crystal');
  if(n>=10) types.push('moving');
  if(n>=15) types.push('ghost');
  if(n>=20&&n%5===0) types.push('blackhole');
  var rows=Math.ceil(numTargets/4);
  var placed=0;
  for(var row=0;row<rows&&placed<numTargets;row++){
    var cols=Math.min(numTargets-placed, 3+Math.floor(Math.random()*2));
    var spacing=W/(cols+1);
    var yBase=140+row*80+Math.random()*20;
    for(var col=0;col<cols&&placed<numTargets;col++){
      var tx=spacing*(col+1)+Math.random()*30-15;
      var ty=yBase+Math.random()*20-10;
      tx=Math.max(30,Math.min(W-30,tx));
      ty=Math.max(100,Math.min(H-200,ty));
      var type=types[Math.floor(Math.random()*types.length)];
      if(placed===0&&n<=3) type='normal';
      var t={x:tx,y:ty,type:type};
      if(type==='moving') t.dx=(Math.random()>0.5?1:-1)*(0.8+Math.random()*0.8);
      tgts.push(t);placed++;
    }
  }
  // Add explosive for chain reactions at higher levels
  if(n>=6&&Math.random()<0.4){
    var ei=Math.floor(Math.random()*tgts.length);
    tgts[ei].type='explosive';
  }
  var pts=[];
  if(n>=8&&Math.random()<0.3+diff*0.05){
    var py=150+Math.random()*(H-350);
    pts.push({ax:40,ay:py,bx:W-40,by:py+Math.random()*100-50});
  }
  var wls=[];
  if(n>=12&&Math.random()<0.3){
    var wy=200+Math.random()*(H-400);
    var wx=80+Math.random()*(W-160);
    wls.push({x:wx,y:wy,w:80+Math.random()*60,h:6});
  }
  return {shots:numShots,targets:tgts,portals:pts,walls:wls};
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

// Enhanced particle spawn with neon colors
function spawnP(x,y,count,color,speed,life){
  speed=speed||4;life=life||40;
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2,s=speed*(0.3+Math.random());
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,ml:life,color:color,r:2+Math.random()*4,glow:Math.random()>0.5});
  }
}

// Glass shard effect
function spawnShards(x,y,color,count){
  count=count||12;sndShatter();
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2+Math.random()*0.4;
    var s=3+Math.random()*6;
    var w=3+Math.random()*8,h=2+Math.random()*4;
    shards.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:45,ml:45,color:color,angle:Math.random()*Math.PI,spin:(Math.random()-0.5)*0.4,w:w,h:h});
  }
}

// Shockwave ring effect
function spawnShockwave(x,y,color,maxR){
  shockwaves.push({x:x,y:y,r:10,maxR:maxR||120,color:color||'#fff',life:20,ml:20});
}

function doShake(a){shake=Math.max(shake,a)}

function showFloat(text,x,y,color,size){
  floaters.push({text:text,x:x,y:y,color:color||'#fff',size:size||22,life:50,ml:50,vy:-2});
}

function flashCombo(c){
  var el=document.getElementById('combo');
  var cols=['#fff','#ffeb3b','#ff9800','#ff5722','#e91e63','#aa00ff'];
  var col=cols[Math.min(c-1,cols.length-1)];
  var labels=['','HIT!','DOUBLE!','TRIPLE!','QUAKE!','INSANE!','GODLIKE!'];
  el.textContent=c>=2?(labels[Math.min(c,labels.length-1)]||('x'+c+'!')):'';
  el.style.color=col;el.style.opacity=1;el.style.fontSize=Math.min(18+c*7,60)+'px';
  el.style.textShadow='0 0 '+Math.min(20+c*8,60)+'px '+col;
  setTimeout(function(){el.style.opacity=0},800);
  sndCombo(c);
  if(c>=3) doShake(c*2);
  if(c>=4) spawnShockwave(W/2,H/2,col,200);
  if(c>=5){
    // Screen flash for big combos
    spawnP(W/2,H/2,40,col,8,30);
  }
}

function explode(x,y,radius){
  radius=radius||90;
  sndExplode();
  spawnShockwave(x,y,'#ff6f00',radius*1.5);
  spawnP(x,y,35,'#ff6f00',8,45);
  spawnP(x,y,25,'#ffcc02',6,35);
  spawnP(x,y,15,'#fff',10,20);
  doShake(10);
  targets.forEach(function(t){if(t.alive&&dist(t,{x:x,y:y})<radius+t.r) damageTarget(t,x,y)});
}

function damageTarget(t,bx,by){
  if(!t.alive) return;
  t.hp--;t.flash=8;
  spawnP(t.x,t.y,10,TCFG[t.type].c1,4,25);
  if(t.hp<=0){
    t.alive=false;
    var earned=t.pts*Math.max(1,combo);
    score+=earned;levelScore+=earned;combo++;
    flashCombo(combo);
    showFloat('+'+earned,t.x,t.y-15,'#ffeb3b',18+Math.min(combo*2,16));
    sndHit();
    if(TCFG[t.type].shatter){
      spawnShards(t.x,t.y,TCFG[t.type].c1,16);
      spawnShockwave(t.x,t.y,TCFG[t.type].c1,80);
    } else {
      spawnP(t.x,t.y,25,TCFG[t.type].c1,7,40);
      spawnP(t.x,t.y,12,'#fff',5,20);
      spawnShockwave(t.x,t.y,TCFG[t.type].c1,60);
    }
    if(TCFG[t.type].explode) setTimeout(function(){explode(t.x,t.y,100)},100);
    // Ghost type: 50% chance to respawn nearby
    if(t.type==='ghost'&&Math.random()<0.4){
      setTimeout(function(){
        t.alive=true;t.hp=1;t.flash=0;
        t.x=Math.max(30,Math.min(W-30,t.x+Math.random()*80-40));
        t.y=Math.max(100,Math.min(H-200,t.y+Math.random()*60-30));
      },600);
    }
    doShake(5);updateUI();
  }
}

function loadLevel(idx){
  var def=genLevel(idx);
  maxShots=def.shots;shots=maxShots;levelScore=0;
  targets=def.targets.map(function(t,i){
    var cfg=TCFG[t.type];
    return {id:i,x:t.x,y:t.y,type:t.type,hp:cfg.hp,maxHp:cfg.hp,r:cfg.r,pts:cfg.pts,color:cfg.c1,dx:t.dx||0,alive:true,flash:0,pulse:Math.random()*Math.PI*2};
  });
  portals=(def.portals||[]).map(function(p){return {ax:p.ax,ay:p.ay,bx:p.bx,by:p.by,r:14,angle:0}});
  walls=def.walls||[];
  particles=[];shards=[];shockwaves=[];balls=[];floaters=[];combo=0;levelCleared=false;state='idle';
  activePU=null;slowFactor=1;
  document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('on')});
  updateUI();
  document.getElementById('lV').textContent=idx;
  // Show level banner
  var bn=document.getElementById('lvlBanner');
  bn.textContent='LEVEL '+idx;bn.style.opacity=1;
  setTimeout(function(){bn.style.opacity=0},1500);
}

function updateUI(){
  document.getElementById('sV').textContent=score;
  document.getElementById('shV').textContent=shots;
}
function getAimVec(){
  if(!aimEnd)return null;
  var sx=W/2,sy=H-70;
  var dx=aimEnd.x-sx,dy=aimEnd.y-sy,len=Math.hypot(dx,dy);
  if(len<5)return null;
  return {vx:(dx/len)*BALL_SPEED,vy:(dy/len)*BALL_SPEED};
}

function shoot(){
  if(shots<=0||(state!=='idle'&&state!=='aiming'))return;
  var av=getAimVec();if(!av){state='idle';return;}
  initAudio();sndShoot();
  shots--;updateUI();state='shooting';
  var count=activePU==='multi'?3:1;
  for(var i=0;i<count;i++){
    var spread=(i-(count-1)/2)*0.22;
    balls.push({
      x:W/2,y:H-70,
      vx:av.vx*Math.cos(spread)-av.vy*Math.sin(spread),
      vy:av.vx*Math.sin(spread)+av.vy*Math.cos(spread),
      bounces:0,dead:false,trail:[],inPortal:0,born:Date.now()
    });
  }
  if(activePU==='slow')slowFactor=0.25;
  // Spawn launch particles
  spawnP(W/2,H-70,12,'#7888ff',4,15);
  combo=0;aimEnd=null;
}

function stepBall(b,dt){
  // Magnet pull
  if(activePU==='magnet'){
    targets.forEach(function(t){
      if(!t.alive)return;var d=dist(b,t);
      if(d<140&&d>1){b.vx+=(t.x-b.x)/d*0.5;b.vy+=(t.y-b.y)/d*0.5;}
    });
  }
  // Blackhole gravity
  targets.forEach(function(t){
    if(!t.alive||t.type!=='blackhole')return;
    var d=dist(b,t);if(d<180&&d>1){
      b.vx+=(t.x-b.x)/d*1.2;b.vy+=(t.y-b.y)/d*1.2;
    }
  });

  b.x+=b.vx*dt;b.y+=b.vy*dt;
  b.trail.push({x:b.x,y:b.y});if(b.trail.length>25)b.trail.shift();

  // Wall bounces with particles
  if(b.x-BALL_R<0){b.x=BALL_R;b.vx=Math.abs(b.vx);b.bounces++;sndBounce();spawnP(b.x,b.y,5,'#7888ff',2,12);}
  if(b.x+BALL_R>W){b.x=W-BALL_R;b.vx=-Math.abs(b.vx);b.bounces++;sndBounce();spawnP(b.x,b.y,5,'#7888ff',2,12);}
  if(b.y-BALL_R<55){b.y=55+BALL_R;b.vy=Math.abs(b.vy);b.bounces++;sndBounce();spawnP(b.x,b.y,5,'#7888ff',2,12);}
  if(b.y+BALL_R>H-35){b.y=H-35-BALL_R;b.vy=-Math.abs(b.vy);b.bounces++;sndBounce();spawnP(b.x,b.y,5,'#7888ff',2,12);}

  // Portal teleport
  portals.forEach(function(p){
    if(dist(b,{x:p.ax,y:p.ay})<p.r+BALL_R&&!b.inPortal){
      b.x=p.bx;b.y=p.by;b.inPortal=50;
      spawnP(p.bx,p.by,15,'#7048e8',6,20);
      spawnShockwave(p.bx,p.by,'#7048e8',50);
      playTone(1200,0.15,'sine',0.08);
    } else if(dist(b,{x:p.bx,y:p.by})<p.r+BALL_R&&!b.inPortal){
      b.x=p.ax;b.y=p.ay;b.inPortal=50;
      spawnP(p.ax,p.ay,15,'#3a85ff',6,20);
      spawnShockwave(p.ax,p.ay,'#3a85ff',50);
      playTone(1200,0.15,'sine',0.08);
    }
    if(b.inPortal>0)b.inPortal--;
  });

  // Wall obstacles
  walls.forEach(function(w){
    if(b.x+BALL_R>w.x&&b.x-BALL_R<w.x+w.w&&b.y+BALL_R>w.y&&b.y-BALL_R<w.y+w.h){
      if(b.vy>0)b.y=w.y-BALL_R; else b.y=w.y+w.h+BALL_R;
      b.vy=-b.vy;b.bounces++;sndBounce();
      spawnP(b.x,b.y,6,'#90a4ae',3,15);
    }
  });

  // Target collision
  targets.forEach(function(t){
    if(t.alive&&dist(b,t)<BALL_R+t.r){
      damageTarget(t,b.x,b.y);
      var d=dist(b,t);if(d<1)d=1;
      var nx=(b.x-t.x)/d,ny=(b.y-t.y)/d;
      var dot=b.vx*nx+b.vy*ny;
      b.vx-=2*dot*nx;b.vy-=2*dot*ny;
      b.x=t.x+nx*(BALL_R+t.r+1);b.y=t.y+ny*(BALL_R+t.r+1);
      b.bounces++;
    }
  });

  if(b.bounces>=MAX_BOUNCES||(Date.now()-b.born>6000))b.dead=true;
}
function drawBG(now){
  // Dark gradient bg
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#080818');bg.addColorStop(0.5,'#0a0a24');bg.addColorStop(1,'#060614');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Subtle grid
  ctx.strokeStyle='rgba(120,136,255,0.03)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=35){ctx.beginPath();ctx.moveTo(x,55);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=55;y<H;y+=35){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  // Ambient floating particles
  var t=now*0.001;
  ctx.fillStyle='rgba(120,136,255,0.08)';
  for(var i=0;i<6;i++){
    var ax=W/2+Math.sin(t+i*1.1)*150,ay=H/2+Math.cos(t*0.7+i*0.8)*200;
    ctx.beginPath();ctx.arc(ax,ay,Math.max(1,2+Math.sin(t+i)*1.5),0,Math.PI*2);ctx.fill();
  }
  // Launcher glow
  ctx.fillStyle='rgba(112,72,232,0.15)';
  ctx.beginPath();ctx.arc(W/2,H-70,30,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(112,72,232,0.5)';
  ctx.beginPath();ctx.arc(W/2,H-70,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.arc(W/2,H-70,5,0,Math.PI*2);ctx.fill();
}

function drawTarget(t,now){
  if(!t.alive)return;
  var cfg=TCFG[t.type];
  t.pulse=(t.pulse||0)+0.05;
  var pr=1+Math.sin(t.pulse)*0.06;
  var r=t.r*pr;
  // Outer neon glow
  var g1=ctx.createRadialGradient(t.x,t.y,r*0.5,t.x,t.y,r*2.5);
  g1.addColorStop(0,cfg.glow);g1.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(t.x,t.y,r*2.5,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  // Flash on hit
  if(t.flash>0){
    t.flash--;ctx.fillStyle='rgba(255,255,255,'+(t.flash/8*0.6)+')';
    ctx.beginPath();ctx.arc(t.x,t.y,r*1.8,0,Math.PI*2);ctx.fill();
  }
  // Body gradient
  var g2=ctx.createRadialGradient(t.x-r*0.25,t.y-r*0.25,0,t.x,t.y,r);
  g2.addColorStop(0,cfg.c1);g2.addColorStop(1,cfg.c2);
  ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  // Specular highlight
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.arc(t.x-r*0.2,t.y-r*0.25,r*0.35,0,Math.PI*2);ctx.fill();
  // Type indicators
  if(t.type==='hard'){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.hp,t.x,t.y);
  }
  if(t.type==='explosive'){
    ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('!',t.x,t.y+1);
  }
  if(t.type==='crystal'){
    // Sparkle effect
    var sa=now*0.005;
    for(var i=0;i<3;i++){
      var sx=t.x+Math.cos(sa+i*2.1)*r*0.6,sy=t.y+Math.sin(sa+i*2.1)*r*0.6;
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();
    }
  }
  if(t.type==='ghost'){
    ctx.globalAlpha=0.5+Math.sin(now*0.004)*0.2;
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('?',t.x,t.y);ctx.globalAlpha=1;
  }
  if(t.type==='blackhole'){
    // Swirling effect
    ctx.strokeStyle='rgba(156,39,176,0.4)';ctx.lineWidth=1.5;
    for(var j=0;j<3;j++){
      ctx.beginPath();ctx.arc(t.x,t.y,r+4+j*6,now*0.003+j*2,now*0.003+j*2+Math.PI);ctx.stroke();
    }
  }
  if(t.type==='moving'){
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.dx>0?'>>':'<<',t.x,t.y);
  }
}
var lastTime=0;
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  if(state==='menu'||state==='levelcomplete'||state==='gameover')return;
  var rawDt=(now-lastTime)/16;lastTime=now;
  var dt=Math.min(rawDt,3)*slowFactor;
  if(slowFactor<1)slowFactor=Math.min(1,slowFactor+0.004);

  var sx=0,sy=0;
  if(shake>0.3){sx=(Math.random()-0.5)*shake*2.5;sy=(Math.random()-0.5)*shake*2.5;shake*=0.82;}
  ctx.save();ctx.translate(sx,sy);

  drawBG(now);

  // Draw walls
  walls.forEach(function(w){
    var wg=ctx.createLinearGradient(w.x,w.y,w.x+w.w,w.y);
    wg.addColorStop(0,'#455a64');wg.addColorStop(0.5,'#78909c');wg.addColorStop(1,'#455a64');
    ctx.fillStyle=wg;
    ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(w.x,w.y,w.w,w.h);
  });

  // Draw portals
  portals.forEach(function(p){
    p.angle=now*0.003;
    [[p.ax,p.ay,'#7048e8','#9c27b0'],[p.bx,p.by,'#3a85ff','#00bcd4']].forEach(function(pp){
      // Portal glow
      var pg=ctx.createRadialGradient(pp[0],pp[1],0,pp[0],pp[1],p.r*2);
      pg.addColorStop(0,pp[2]+'44');pg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(pp[0],pp[1],p.r*2,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
      // Spinning ring
      ctx.strokeStyle=pp[2];ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(pp[0],pp[1],p.r,p.angle,p.angle+Math.PI*1.6);ctx.stroke();
      ctx.strokeStyle=pp[3];ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(pp[0],pp[1],Math.max(1,p.r*0.6),p.angle+Math.PI,p.angle+Math.PI*2.2);ctx.stroke();
      // Center dot
      ctx.fillStyle=pp[2];ctx.beginPath();ctx.arc(pp[0],pp[1],3,0,Math.PI*2);ctx.fill();
    });
  });

  // Draw targets
  targets.forEach(function(t){
    if(t.type==='moving'&&t.alive){t.x+=t.dx*dt;if(t.x<t.r+10||t.x>W-t.r-10)t.dx=-t.dx;}
    drawTarget(t,now);
  });

  // Aim line
  if((state==='idle'||state==='aiming')&&aimEnd){
    var av=getAimVec();
    if(av){
      // Dotted aim line with glow
      ctx.shadowColor='#7888ff';ctx.shadowBlur=6;
      ctx.setLineDash([4,8]);ctx.strokeStyle='rgba(120,136,255,0.4)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(W/2,H-70);ctx.lineTo(W/2+av.vx*22,H-70+av.vy*22);ctx.stroke();
      ctx.setLineDash([]);ctx.shadowBlur=0;
      // Aim dot
      ctx.fillStyle='rgba(120,136,255,0.7)';
      ctx.beginPath();ctx.arc(W/2+av.vx*22,H-70+av.vy*22,4,0,Math.PI*2);ctx.fill();
    }
  }

  // Draw balls with neon trail
  balls.forEach(function(b){
    if(!b.dead){
      stepBall(b,dt);
      // Neon trail
      for(var i=1;i<b.trail.length;i++){
        var alpha=(i/b.trail.length)*0.5;
        var tr=Math.max(1,BALL_R*(i/b.trail.length)*0.8);
        ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,tr,0,Math.PI*2);
        ctx.fillStyle='rgba(120,136,255,'+alpha+')';ctx.fill();
      }
      // Ball glow
      ctx.shadowColor='#7888ff';ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);
      var bg=ctx.createRadialGradient(b.x-2,b.y-2,0,b.x,b.y,BALL_R);
      bg.addColorStop(0,'#ffffff');bg.addColorStop(0.7,'#c5cae9');bg.addColorStop(1,'#7888ff');
      ctx.fillStyle=bg;ctx.fill();
      ctx.shadowBlur=0;
    }
  });

  // Draw particles with glow
  particles=particles.filter(function(p){
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.05*dt;p.life-=dt;
    var alpha=p.life/p.ml;var r=Math.max(0.5,p.r*alpha);
    if(p.glow){ctx.shadowColor=p.color;ctx.shadowBlur=8;}
    ctx.globalAlpha=alpha;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    return p.life>0;
  });

  // Draw shards (glass break effect)
  shards=shards.filter(function(s){
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=0.2*dt;s.life-=dt;s.angle+=s.spin*dt;
    var alpha=s.life/s.ml;
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);
    ctx.globalAlpha=alpha;ctx.fillStyle=s.color;
    ctx.fillRect(-s.w/2,-s.h/2,s.w,s.h);
    // Glass reflection
    ctx.fillStyle='rgba(255,255,255,'+alpha*0.4+')';
    ctx.fillRect(-s.w/2,-s.h/2,s.w*0.3,s.h*0.3);
    ctx.restore();ctx.globalAlpha=1;
    return s.life>0;
  });

  // Draw shockwaves
  shockwaves=shockwaves.filter(function(sw){
    sw.life-=dt;sw.r+=(sw.maxR-sw.r)*0.15*dt;
    var alpha=sw.life/sw.ml*0.6;
    ctx.strokeStyle=sw.color;ctx.globalAlpha=alpha;ctx.lineWidth=3*(sw.life/sw.ml);
    ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    return sw.life>0;
  });

  // Floaters
  floaters=floaters.filter(function(f){
    f.y+=f.vy;f.life--;
    var alpha=f.life/f.ml;
    ctx.globalAlpha=alpha;
    ctx.shadowColor=f.color;ctx.shadowBlur=10;
    ctx.font='bold '+f.size+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle=f.color;
    ctx.fillText(f.text,f.x,f.y);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    return f.life>0;
  });

  ctx.restore();

  // Check level clear
  var alive=targets.filter(function(t){return t.alive}).length;
  if(state==='shooting'&&alive===0&&!levelCleared){
    levelCleared=true;
    setTimeout(showLC,600);
  }
  // Check all balls dead
  if(state==='shooting'&&balls.length>0&&balls.every(function(b){return b.dead})){
    balls=[];
    if(!levelCleared){
      if(shots<=0)setTimeout(showGO,500);
      else state='idle';
    }
  }
}
function showLC(){
  var stars=shots>=maxShots?3:shots>=1?2:1;
  var allOneShot=(maxShots-shots)<=1&&targets.length>=3;
  var st='';for(var i=0;i<3;i++)st+=i<stars?'\u2B50':'\u2606';
  var title=allOneShot?'PERFECT SHOT!':stars===3?'PERFECT!':'LEVEL CLEARED!';
  document.getElementById('lcT').textContent=title;
  document.getElementById('lcT').style.color=allOneShot?'#ffeb3b':stars===3?'#ffeb3b':'#fff';
  document.getElementById('lcSc').textContent='Score: +'+levelScore;
  document.getElementById('lcSt').textContent=st;
  document.getElementById('lcS').style.display='flex';
  state='levelcomplete';
  if(allOneShot)sndPerfect();
  else playTone(523,0.2,'sine',0.1);
}

function showGO(){
  sndFail();
  var alive=targets.filter(function(t){return t.alive}).length;
  document.getElementById('goSc').textContent='Score: '+score;
  var msgs=['SO CLOSE! '+alive+' left!','Almost! Just '+alive+' more!','Try again! '+alive+' remaining!','ARGH! '+alive+' survived!'];
  document.getElementById('goMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('goS').style.display='flex';
  state='gameover';
}

function startGame(){
  initAudio();
  document.getElementById('overlay').style.display='none';
  document.getElementById('lcS').style.display='none';
  document.getElementById('goS').style.display='none';
  score=0;level=1;loadLevel(1);
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function nextLvl(){
  document.getElementById('lcS').style.display='none';
  level++;loadLevel(level);
}

function retryLvl(){
  document.getElementById('goS').style.display='none';
  loadLevel(level);
}

function restartG(){
  document.getElementById('goS').style.display='none';
  score=0;level=1;loadLevel(1);
}

function getPos(e){
  var rect=c.getBoundingClientRect();
  var src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-rect.left)*(W/rect.width),y:(src.clientY-rect.top)*(H/rect.height)};
}

c.addEventListener('mousemove',function(e){
  if(state==='idle'||state==='aiming'){aimEnd=getPos(e);state='aiming';}
});
c.addEventListener('click',function(e){
  if(state==='idle'||state==='aiming'){aimEnd=getPos(e);shoot();}
});
c.addEventListener('touchstart',function(e){
  e.preventDefault();initAudio();
  if(state==='idle'||state==='aiming'){aimEnd=getPos(e);state='aiming';}
},{passive:false});
c.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(state==='aiming')aimEnd=getPos(e);
},{passive:false});
c.addEventListener('touchend',function(e){
  e.preventDefault();
  if(state==='aiming')shoot();
},{passive:false});

document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('nxBtn').addEventListener('click',nextLvl);
document.getElementById('rtBtn').addEventListener('click',retryLvl);
document.getElementById('rsBtn').addEventListener('click',restartG);

['multi','slow','magnet'].forEach(function(id){
  var btn=document.getElementById('pu-'+id);
  btn.addEventListener('click',function(e){
    e.stopPropagation();initAudio();
    if(state!=='idle'&&state!=='aiming')return;
    activePU=activePU===id?null:id;
    document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('on')});
    if(activePU)btn.classList.add('on');
    playTone(activePU?880:440,0.08,'sine',0.06);
  });
});

function resize(){
  var wr=document.getElementById('W');
  var s=Math.min(window.innerWidth/400,window.innerHeight/750);
  wr.style.transform='scale('+s+')';
  wr.style.transformOrigin='top center';
  wr.style.marginTop=Math.max(0,(window.innerHeight-750*s)/2)+'px';
}
window.addEventListener('resize',resize);resize();
</script>
</body></html>
