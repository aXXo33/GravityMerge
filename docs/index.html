<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Gravity Merge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0b24;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;color:#fff}
canvas{display:block;position:absolute;top:0;left:0}
/* HUD */
.hud{position:absolute;z-index:20;pointer-events:none}
#hud-top{top:0;left:0;width:100%;height:58px;background:linear-gradient(180deg,rgba(0,0,0,.85)0%,rgba(0,0,0,.3)70%,transparent);display:flex;align-items:center;padding:0 12px}
#hud-top .col{flex:1;display:flex;flex-direction:column}
#hud-top .col.c{align-items:center}
#hud-top .col.r{align-items:flex-end}
.hud-sm{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.8px}
.hud-lg{font-size:24px;font-weight:900}
#drops-left{color:#44ddff}
#score-val{color:#fff;text-shadow:0 0 12px rgba(255,200,50,.5)}
#target-val{color:#ffaa00;font-size:12px}
/* STAR BAR */
#star-bar{position:absolute;top:50px;left:50%;transform:translateX(-50%);width:55%;height:22px;z-index:21;pointer-events:none}
#star-track{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;position:relative;margin-top:8px}
#star-fill{height:100%;background:linear-gradient(90deg,#ff6b35,#ffcc00);border-radius:3px;width:0%;transition:width .4s}
.star-mark{position:absolute;top:-8px;font-size:16px;transform:translateX(-50%);transition:all .3s;filter:grayscale(1) brightness(.5)}
.star-mark.lit{filter:none;transform:translateX(-50%) scale(1.3)}
/* LEVEL INTRO */
#intro{position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse at center,#1a0d3a,#0b0b24)}
#intro.on{display:flex}
#intro .world-name{font-size:13px;color:#ff6b35;text-transform:uppercase;letter-spacing:3px;margin-bottom:4px}
#intro .lv-num{font-size:64px;font-weight:900;background:linear-gradient(135deg,#ff6b35,#ff2277);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
#intro .lv-goal{font-size:18px;color:#ddd;margin:12px 0 4px}
#intro .lv-detail{font-size:13px;color:#888;margin-bottom:20px}
#intro .lv-drops{font-size:22px;color:#44ddff;font-weight:700}
#intro .lv-stars{font-size:14px;color:#ffcc00;margin:10px 0 20px}
#intro button{padding:16px 60px;font-size:22px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6b35,#ff2277);color:#fff;cursor:pointer;font-weight:800;box-shadow:0 6px 25px rgba(255,34,119,.4);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
/* LEVEL COMPLETE */
#complete{position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.92)}
#complete.on{display:flex}
#complete .title{font-size:28px;font-weight:900;margin-bottom:8px}
#complete .stars-big{font-size:64px;letter-spacing:10px;margin:10px 0;filter:drop-shadow(0 0 20px rgba(255,200,0,.6))}
#complete .stat{font-size:14px;color:#aaa;margin:2px 0}
#complete .coins-earned{font-size:20px;color:#ffcc00;margin:12px 0}
#complete .new-best{font-size:13px;color:#ff6b35;margin-bottom:6px}
#complete button{margin:5px;padding:14px 40px;font-size:18px;border:none;border-radius:14px;cursor:pointer;font-weight:700}
.btn-primary{background:linear-gradient(135deg,#ff6b35,#ff2277);color:#fff;box-shadow:0 4px 15px rgba(255,34,119,.3)}
.btn-retry{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)!important}
.btn-retry:hover{background:rgba(255,255,255,.15)}
/* LEVEL FAIL */
#fail{position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.92)}
#fail.on{display:flex}
#fail .title{font-size:28px;font-weight:900;color:#ff4444;margin-bottom:4px}
#fail .reason{font-size:14px;color:#888;margin-bottom:8px}
#fail .almost{font-size:16px;color:#ffaa00;margin-bottom:16px}
/* START / MAP */
#menu{position:absolute;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#0b0b24,#150a35,#0b0b24);overflow-y:auto;padding-bottom:40px}
#menu .logo{font-size:38px;font-weight:900;margin-top:40px;background:linear-gradient(135deg,#ff6b35,#ff2277,#aa44ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#menu .tag{color:#666;font-size:13px;margin:4px 0 16px}
#menu .coin-bar{color:#ffcc00;font-size:16px;margin-bottom:16px}
/* LEVEL MAP */
.world-section{width:85%;max-width:360px;margin:8px 0}
.world-header{font-size:13px;color:#ff6b35;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.world-header .lock{color:#555;font-size:11px}
.level-grid{display:flex;flex-wrap:wrap;gap:6px}
.lv-btn{width:48px;height:48px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.lv-btn:hover{border-color:#ff2277;background:rgba(255,34,119,.1)}
.lv-btn .num{font-size:16px;font-weight:800}
.lv-btn .mini-stars{font-size:8px;color:#ffcc00;margin-top:1px}
.lv-btn.current{border-color:#ff6b35;background:rgba(255,107,53,.15);box-shadow:0 0 12px rgba(255,107,53,.3)}
.lv-btn.locked{opacity:.3;pointer-events:none;border-color:transparent}
.lv-btn.locked .num{color:#555}
.danger-edge{position:absolute;top:0;width:5px;height:100%;z-index:15;opacity:0;transition:opacity .2s;pointer-events:none}
#dgl{left:0}#dgr{right:0}
</style>
</head>
<body>
<div id="menu">
<div class="logo">GRAVITY MERGE</div>
<div class="tag">Drop · Merge · Evolve</div>
<div class="coin-bar" id="menu-coins">🪙 0</div>
<div id="level-map"></div>
</div>
<canvas id="c"></canvas>
<div class="hud" id="hud-top">
<div class="col"><div class="hud-sm">DROPS</div><div class="hud-lg" id="drops-left">10</div></div>
<div class="col c"><div class="hud-lg" id="score-val">0</div><div id="target-val"></div></div>
<div class="col r"><div class="hud-sm">NEXT</div><div class="hud-lg" id="next-orb">●</div></div>
</div>
<div id="star-bar"><div id="star-track"><div id="star-fill"></div></div></div>
<div class="danger-edge" id="dgl"></div>
<div class="danger-edge" id="dgr"></div>
<div id="intro"><div class="world-name" id="i-world"></div><div class="lv-num" id="i-lv"></div><div class="lv-goal" id="i-goal"></div><div class="lv-detail" id="i-detail"></div><div class="lv-drops" id="i-drops"></div><div class="lv-stars" id="i-stars"></div><button onclick="startLevel()">GO!</button></div>
<div id="complete"><div class="title" id="c-title">COMPLETE!</div><div class="stars-big" id="c-stars"></div><div class="stat" id="c-score"></div><div class="stat" id="c-best"></div><div class="coins-earned" id="c-coins"></div><div class="new-best" id="c-new"></div><button class="btn-primary" id="c-next-btn" onclick="goNext()">NEXT LEVEL</button><button class="btn-retry" onclick="retryLevel()">RETRY ★★★</button><button class="btn-retry" onclick="goMap()">MAP</button></div>
<div id="fail"><div class="title">FAILED!</div><div class="reason" id="f-reason"></div><div class="almost" id="f-almost"></div><button class="btn-primary" onclick="retryLevel()">TRY AGAIN</button><button class="btn-retry" onclick="goMap()">MAP</button></div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');

// === TIERS ===
const T=[
{n:'Spark',c:'#7BB8F0',g:'#a0d0ff',r:13,pt:2,m:1,emoji:'✦'},
{n:'Ember',c:'#FF8844',g:'#ffaa66',r:16,pt:6,m:2,emoji:'🔸'},
{n:'Flame',c:'#FF3333',g:'#ff6655',r:19,pt:18,m:3,emoji:'🔥'},
{n:'Comet',c:'#33DDFF',g:'#66eeff',r:23,pt:54,m:4,emoji:'☄️'},
{n:'Nova',c:'#FFDD33',g:'#ffee66',r:27,pt:162,m:5,emoji:'💫'},
{n:'Star',c:'#FF44AA',g:'#ff66cc',r:31,pt:486,m:6,emoji:'⭐'},
{n:'Nebula',c:'#AA44FF',g:'#cc66ff',r:36,pt:1458,m:7,emoji:'🌀'},
{n:'Pulsar',c:'#33FF88',g:'#66ffaa',r:41,pt:4374,m:8,emoji:'💚'},
{n:'Quasar',c:'#FF9900',g:'#ffbb33',r:46,pt:13122,m:9,emoji:'🌟'},
{n:'Super',c:'#FF2266',g:'#ff4488',r:52,pt:39366,m:10,emoji:'💥'},
{n:'Galaxy',c:'#7744FF',g:'#aa66ff',r:58,pt:118098,m:11,emoji:'🌌'},
{n:'Universe',c:'#FFFFFF',g:'#ffffcc',r:65,pt:354294,m:12,emoji:'✨'}
];
const COMBOM=[1,1,2,2,3,5,5,8,10,15,25,25,25];

// === AUDIO ===
let ac=null;
function ia(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function tn(f,d,t,v){if(!ac)return;try{let o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function sndPop(t){let f=350+t*100;tn(f,.12,'sine',.1);tn(f*1.5,.08,'triangle',.06);if(t>3)tn(f*.5,.25,'sine',.05);if(t>7)tn(80,.4,'sine',.08)}
function sndDrop(){tn(220,.06,'sine',.04)}
function sndCombo(n){tn(600+n*80,.15,'triangle',.09);tn(800+n*100,.1,'sine',.06)}
function sndStar(){tn(523,.1,'sine',.12);setTimeout(()=>tn(659,.1,'sine',.12),80);setTimeout(()=>tn(784,.15,'sine',.12),160)}
function sndWin(){for(let i=0;i<5;i++)setTimeout(()=>tn(523+i*100,.15,'sine',.08),i*100)}
function sndFail(){tn(200,.3,'sawtooth',.08);tn(150,.4,'sine',.06)}
function sndBoom(){tn(70,.5,'sawtooth',.15);tn(50,.6,'sine',.1)}
function sndClutch(){tn(800,.25,'sine',.12);tn(1100,.2,'triangle',.08)}

// === STATE ===
let W,H,COLS=6,WALL=6,cW,bL,bR,bB,bT;
let balls=[],pts=[],fts=[],sws=[];
let score=0,best=0,coins=0,combo=0,comboT=0;
let state='map'; // map|intro|play|drop|complete|fail
let curT=0,nxtT=0,dropX=0,dropCD=0;
let grav=.4,fric=.98,bnc=.42;
let danger=0,hiTier=0,fr=0;
let totMerge=0,bestCombo=0,dropsUsed=0;
let clutch=false,clutchCD=0,prevDanger=0;
let shake=0,shX=0,shY=0;
let chainN=0,chainT=0,maxChain=0;
let slowMo=1,slowMoT=0;
let obstacles=[];

// Level
let curLv=1,maxUnlocked=1;
let lvDrops=0,lvMaxDrops=0,lvTarget=0,lvStar1=0,lvStar2=0,lvStar3=0;
let lvType='',lvMods={};
let starsEarned=[]; // per level
let totalStars=0;
// === 50 LEVELS — SHORT, CLEAR GOALS, LIMITED DROPS ===
// Philosophy: Every level is a puzzle. You have X drops to reach Y score.
// Stars are thresholds: ★ = complete, ★★ = good, ★★★ = perfect
// World gates: need N stars to unlock next world
const WORLDS=[
  {n:'Spark Field',from:1,to:10,stars:0,color:'#7BB8F0'},
  {n:'Ember Caves',from:11,to:20,stars:12,color:'#FF8844'},
  {n:'Nova Storm',from:21,to:30,stars:30,color:'#FFDD33'},
  {n:'Black Hole',from:31,to:40,stars:52,color:'#AA44FF'},
  {n:'Big Bang',from:41,to:50,stars:78,color:'#FF2266'}
];

function getLvl(n){
  let L={drops:10,type:'score',target:50,s1:50,s2:100,s3:200,maxS:1,mods:{},obs:0,oType:'',desc:'',world:''};
  // WORLD 1: Learn to merge (1-10)
  if(n===1){L.drops=8;L.target=10;L.s1=10;L.s2=20;L.s3=40;L.maxS=0;L.desc='Score 10 points';L.world='Spark Field'}
  else if(n===2){L.drops=8;L.target=20;L.s1=20;L.s2=40;L.s3=80;L.maxS=0;L.desc='Score 20 points';L.world='Spark Field'}
  else if(n===3){L.drops=10;L.target=30;L.s1=30;L.s2=60;L.s3=120;L.maxS=1;L.desc='Score 30';L.world='Spark Field'}
  else if(n===4){L.drops=10;L.target=50;L.s1=50;L.s2=100;L.s3=200;L.maxS=1;L.desc='Score 50';L.world='Spark Field'}
  else if(n===5){L.drops=12;L.target=80;L.s1=80;L.s2=160;L.s3=350;L.maxS=1;L.desc='Score 80';L.world='Spark Field'}
  else if(n===6){L.drops=10;L.type='tier';L.target=2;L.s1=30;L.s2=80;L.s3=200;L.maxS=1;L.desc='Create a Flame!';L.world='Spark Field'}
  else if(n===7){L.drops=12;L.target=150;L.s1=150;L.s2=300;L.s3=600;L.maxS=1;L.desc='Score 150';L.world='Spark Field'}
  else if(n===8){L.drops=10;L.type='tier';L.target=3;L.s1=50;L.s2=150;L.s3=400;L.maxS=2;L.desc='Create a Comet!';L.world='Spark Field'}
  else if(n===9){L.drops=14;L.target=300;L.s1=300;L.s2=600;L.s3=1200;L.maxS=2;L.desc='Score 300';L.world='Spark Field'}
  else if(n===10){L.drops=12;L.type='tier';L.target=4;L.s1=200;L.s2=500;L.s3=1500;L.maxS=2;L.desc='Create a NOVA!';L.world='Spark Field'}
  // WORLD 2: Obstacles + fewer drops (11-20)
  else if(n===11){L.drops=12;L.target=400;L.s1=400;L.s2=800;L.s3=1800;L.maxS=2;L.obs=1;L.oType='ice';L.desc='Score 400';L.world='Ember Caves'}
  else if(n===12){L.drops=10;L.type='tier';L.target=4;L.s1=300;L.s2=700;L.s3=1600;L.maxS=2;L.obs=1;L.oType='ice';L.desc='Create a Nova!';L.world='Ember Caves'}
  else if(n===13){L.drops=14;L.target=800;L.s1=800;L.s2=1600;L.s3=4000;L.maxS=3;L.obs=1;L.oType='stone';L.desc='Score 800';L.world='Ember Caves'}
  else if(n===14){L.drops=12;L.target=600;L.s1=600;L.s2=1200;L.s3=3000;L.maxS=3;L.obs=2;L.oType='ice';L.desc='Score 600';L.world='Ember Caves'}
  else if(n===15){L.drops=10;L.type='tier';L.target=5;L.s1=500;L.s2=1500;L.s3=4000;L.maxS=3;L.desc='Create a Star!';L.world='Ember Caves'}
  else if(n<=20){L.drops=12+(n-16);L.target=1000+(n-16)*400;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*4;L.maxS=3;L.obs=Math.floor((n-15)/2);L.oType='stone';L.desc='Score '+L.target;L.world='Ember Caves'}
  // WORLD 3: Specials + tight drops (21-30)
  else if(n<=25){L.drops=12;L.target=2000+(n-21)*800;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*4;L.maxS=4;L.mods={specials:true};L.desc='Score '+L.target;L.world='Nova Storm'}
  else if(n===26){L.drops=14;L.type='tier';L.target=6;L.s1=3000;L.s2=8000;L.s3=20000;L.maxS=4;L.mods={specials:true};L.desc='Create a Nebula!';L.world='Nova Storm'}
  else if(n<=30){L.drops=14;L.target=5000+(n-27)*2000;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*4;L.maxS=5;L.mods={specials:true};L.obs=n>28?1:0;L.oType='stone';L.desc='Score '+L.target;L.world='Nova Storm'}
  // WORLD 4: Chaos (31-40)
  else if(n<=35){L.drops=14;L.target=10000+(n-31)*3000;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*3.5;L.maxS=5;L.mods={specials:true,lowGrav:n%2===0};L.desc='Score '+L.target;L.world='Black Hole'}
  else if(n===36){L.drops=16;L.type='tier';L.target=8;L.s1=15000;L.s2=40000;L.s3=100000;L.maxS=6;L.mods={specials:true,lowGrav:true};L.desc='Create a Quasar!';L.world='Black Hole'}
  else if(n<=40){L.drops=16;L.target=25000+(n-37)*5000;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*3;L.maxS=6;L.mods={specials:true,quake:true};L.obs=1;L.oType='dark';L.desc='Score '+L.target;L.world='Black Hole'}
  // WORLD 5: Ultimate (41-50)
  else if(n<=45){L.drops=16;L.target=40000+(n-41)*8000;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*3;L.maxS=7;L.mods={specials:true,quake:n%2===0,lowGrav:n%3===0};L.obs=1;L.oType='dark';L.desc='Score '+L.target;L.world='Big Bang'}
  else if(n===46){L.drops=18;L.type='tier';L.target=10;L.s1=80000;L.s2=200000;L.s3=500000;L.maxS=8;L.mods={specials:true};L.desc='Create a Galaxy!';L.world='Big Bang'}
  else if(n<=49){L.drops=18;L.target=80000+(n-47)*20000;L.s1=L.target;L.s2=L.target*2;L.s3=L.target*3;L.maxS=8;L.mods={specials:true,quake:true,lowGrav:true};L.obs=2;L.oType='dark';L.desc='Score '+L.target;L.world='Big Bang'}
  else{L.drops=20;L.type='tier';L.target=11;L.s1=200000;L.s2=500000;L.s3=1000000;L.maxS=9;L.mods={specials:true,quake:true,lowGrav:true};L.obs=2;L.oType='dark';L.desc='CREATE THE UNIVERSE';L.world='Big Bang'}
  return L;
}
// === SAVE/LOAD ===
function save(){localStorage.setItem('gm4',JSON.stringify({coins,maxUnlocked,starsEarned,best}))}
function load(){try{let d=JSON.parse(localStorage.getItem('gm4')||'{}');coins=d.coins||0;maxUnlocked=d.maxUnlocked||1;starsEarned=d.starsEarned||[];best=d.best||0}catch(e){}}

// === RESIZE ===
function resize(){
  W=Math.min(window.innerWidth,window.innerHeight*9/16);H=W*16/9;
  if(H>window.innerHeight){H=window.innerHeight;W=H*9/16}
  W=Math.floor(W);H=Math.floor(H);
  C.width=W;C.height=H;
  C.style.width=W+'px';C.style.height=H+'px';
  C.style.left=((window.innerWidth-W)/2)+'px';
  C.style.top=((window.innerHeight-H)/2)+'px';
  cW=(W-WALL*2)/COLS;bL=WALL;bR=W-WALL;bT=78;bB=H-WALL;dropX=W/2;
}

// === MAP SCREEN ===
function buildMap(){
  let map=document.getElementById('level-map');map.innerHTML='';
  totalStars=starsEarned.reduce((a,b)=>a+(b||0),0);
  document.getElementById('menu-coins').textContent='🪙 '+coins+' | ⭐ '+totalStars;
  WORLDS.forEach(w=>{
    let sec=document.createElement('div');sec.className='world-section';
    let locked=totalStars<w.stars;
    let hdr=document.createElement('div');hdr.className='world-header';
    hdr.innerHTML='<span style="color:'+w.color+'">'+w.n+'</span>'+(locked?'<span class="lock">🔒 Need '+w.stars+' ⭐</span>':'');
    sec.appendChild(hdr);
    let grid=document.createElement('div');grid.className='level-grid';
    for(let i=w.from;i<=w.to;i++){
      let btn=document.createElement('div');btn.className='lv-btn';
      let isLocked=locked||i>maxUnlocked;
      if(isLocked)btn.classList.add('locked');
      if(i===maxUnlocked&&!locked)btn.classList.add('current');
      let st=starsEarned[i]||0;
      btn.innerHTML='<div class="num">'+i+'</div><div class="mini-stars">'+'⭐'.repeat(st)+'</div>';
      if(!isLocked)btn.onclick=()=>{curLv=i;showIntro()};
      grid.appendChild(btn);
    }
    sec.appendChild(grid);map.appendChild(sec);
  });
}

// === LEVEL INTRO ===
function showIntro(){
  let L=getLvl(curLv);
  document.getElementById('menu').style.display='none';
  document.getElementById('i-world').textContent=L.world;
  document.getElementById('i-lv').textContent=curLv;
  document.getElementById('i-goal').textContent=L.desc;
  document.getElementById('i-detail').textContent=L.type==='tier'?'Create this orb to complete!':'Reach the target score';
  document.getElementById('i-drops').textContent=L.drops+' drops';
  document.getElementById('i-stars').textContent='★ '+L.s1.toLocaleString()+' | ★★ '+L.s2.toLocaleString()+' | ★★★ '+L.s3.toLocaleString();
  document.getElementById('intro').classList.add('on');
}

function startLevel(){
  ia();document.getElementById('intro').classList.remove('on');
  let L=getLvl(curLv);
  balls=[];pts=[];fts=[];sws=[];obstacles=[];
  score=0;combo=0;comboT=0;hiTier=0;dropCD=0;danger=0;prevDanger=0;
  totMerge=0;bestCombo=0;dropsUsed=0;chainN=0;chainT=0;maxChain=0;
  clutch=false;clutchCD=0;slowMo=1;slowMoT=0;shake=0;shX=0;shY=0;fr=0;
  lvMaxDrops=L.drops;lvDrops=L.drops;lvTarget=L.target;lvType=L.type;
  lvStar1=L.s1;lvStar2=L.s2;lvStar3=L.s3;lvMods=L.mods||{};
  // Obstacles
  for(let i=0;i<L.obs;i++){
    let ox=bL+Math.floor(Math.random()*COLS)*cW+cW/2;
    let oy=bB-25-Math.floor(Math.random()*3)*35;
    obstacles.push({x:ox,y:oy,type:L.oType,hp:L.oType==='ice'?2:3,w:cW*.8,h:26});
  }
  updHUD();
  // Clear star marks for fresh animation
  for(let i=0;i<3;i++){let el=document.getElementById('sm'+i);if(el)el.dataset.done=''}
  updStarBar();
  state='play';
}

// === BALL ===
function mkB(x,y,t){let d=T[t],s=W/360;return{x,y,vx:0,vy:0,tier:t,r:Math.max(4,d.r*s),c:d.c,gl:d.g,mass:d.m,mg:false,sc2:0,sq:1,st:1,bp:Math.random()*6.28,tr:[],spec:null}}

// === PARTICLES ===
function addP(x,y,c,n,sp){sp=sp||4;for(let i=0;i<n;i++){let a=Math.random()*6.28,s=1+Math.random()*sp;pts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,l:1,d:.015+Math.random()*.02,r:1.5+Math.random()*3,c})}}
function addF(x,y,t,c,sz){fts.push({x,y,t,c,l:1,vy:-2.2,sz:sz||16})}
function addSW(x,y,t){sws.push({x,y,r:8,mr:30+t*14,f:.5+t*.6,l:1,c:T[Math.min(t,11)].c})}
// === PHYSICS ===
function physics(){
  let g=(lvMods.lowGrav)?grav*.55:grav;
  for(let b of balls){
    b.vy+=g*slowMo;b.x+=b.vx*slowMo;b.y+=b.vy*slowMo;b.vx*=fric;
    let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    b.st=1+Math.min(spd*.018,.12);b.sq=1/b.st;
    if(spd>3.5){b.tr.push({x:b.x,y:b.y,l:1});if(b.tr.length>6)b.tr.shift()}
    for(let t of b.tr)t.l-=.15;b.tr=b.tr.filter(t=>t.l>0);
    if(b.x-b.r<bL){b.x=bL+b.r;b.vx=Math.abs(b.vx)*bnc}
    if(b.x+b.r>bR){b.x=bR-b.r;b.vx=-Math.abs(b.vx)*bnc}
    if(b.y+b.r>bB){b.y=bB-b.r;b.vy=-Math.abs(b.vy)*bnc;if(Math.abs(b.vy)<.5)b.vy=0;if(spd>2.5)addP(b.x,bB-2,b.c,2,1)}
    for(let o of obstacles){
      let cx=Math.max(o.x-o.w/2,Math.min(b.x,o.x+o.w/2));
      let cy=Math.max(o.y-o.h/2,Math.min(b.y,o.y+o.h/2));
      let dx=b.x-cx,dy=b.y-cy,d=Math.sqrt(dx*dx+dy*dy);
      if(d<b.r&&d>.01){let nx=dx/d,ny=dy/d;b.x=cx+nx*b.r;b.y=cy+ny*b.r;let dt=b.vx*nx+b.vy*ny;b.vx-=2*dt*nx*.5;b.vy-=2*dt*ny*.5}
    }
    for(let o of balls){
      if(o===b)continue;let dx=b.x-o.x,dy=b.y-o.y,d=Math.sqrt(dx*dx+dy*dy),md=b.r+o.r;
      if(d<md&&d>.01){let nx=dx/d,ny=dy/d,ov=(md-d)/2,tm=b.mass+o.mass,br=o.mass/tm,or2=b.mass/tm;
        b.x+=nx*ov*br;b.y+=ny*ov*br;o.x-=nx*ov*or2;o.y-=ny*ov*or2;
        let dvx=b.vx-o.vx,dvy=b.vy-o.vy,dvn=dvx*nx+dvy*ny;
        if(dvn>0){b.vx-=dvn*nx*.45*br*2;b.vy-=dvn*ny*.45*br*2;o.vx+=dvn*nx*.45*or2*2;o.vy+=dvn*ny*.45*or2*2}}
    }
  }
}

// === SHOCKWAVES ===
function updSW(){
  for(let s of sws){s.r+=(s.mr-s.r)*.15;s.l-=.04;
    for(let b of balls){let dx=b.x-s.x,dy=b.y-s.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<s.r+20&&d>1){let f=s.f*(1-d/(s.r+20))/b.mass;b.vx+=dx/d*f;b.vy+=dy/d*f}}
    for(let o of obstacles){let dx=o.x-s.x,dy=o.y-s.y;if(Math.sqrt(dx*dx+dy*dy)<s.r+30){o.hp-=.12;if(o.hp<=0)addP(o.x,o.y,'#aaa',8)}}}
  sws=sws.filter(s=>s.l>0);obstacles=obstacles.filter(o=>o.hp>0);
}

// === MERGE ===
function checkMerge(){
  let ct=clutch?1.15:1.05;
  for(let i=0;i<balls.length;i++){
    if(balls[i].mg)continue;
    for(let j=i+1;j<balls.length;j++){
      if(balls[j].mg||balls[i].tier!==balls[j].tier)continue;
      let dx=balls[i].x-balls[j].x,dy=balls[i].y-balls[j].y,d=Math.sqrt(dx*dx+dy*dy),md=balls[i].r+balls[j].r;
      if(d<md*ct){
        let a=balls[i],b2=balls[j],mx=(a.x+b2.x)/2,my=(a.y+b2.y)/2,nt=a.tier+1;
        a.mg=true;b2.mg=true;totMerge++;chainN++;chainT=50;
        addP(mx,my,a.c,8+nt*4,2+nt*.5);sndPop(nt);shake=Math.max(shake,1.5+nt*1.5);
        if(nt>=2)addSW(mx,my,nt);
        if(nt<T.length){
          let nb=mkB(mx,my,nt);nb.vy=-2-nt*.25;balls.push(nb);
          if(nt>hiTier)hiTier=nt;
          combo++;comboT=1500;if(combo>bestCombo)bestCombo=combo;
          let mul=COMBOM[Math.min(combo,COMBOM.length-1)];
          let p=T[nt].pt*mul;score+=p;
          addF(mx,my-20,'+'+p.toLocaleString(),T[nt].c,Math.min(12+nt*2,26));
          if(nt>=3){coins+=1;if(nt>=6)coins+=2;if(nt>=9)coins+=5}
          if(combo>=3){sndCombo(combo);document.getElementById('combo-hud')||(()=>{})();
            let ch=document.createElement('div');ch.style.cssText='position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:'+(20+combo*2)+'px;font-weight:900;color:'+(combo>=8?'#ff3333':combo>=5?'#ff8800':'#ffcc00')+';z-index:30;pointer-events:none;opacity:1;transition:opacity .5s,transform .5s;text-shadow:0 0 20px currentColor';
            ch.textContent='COMBO x'+mul+'!';document.body.appendChild(ch);
            setTimeout(()=>{ch.style.opacity='0';ch.style.transform='translate(-50%,-80%) scale(1.3)'},100);setTimeout(()=>ch.remove(),800)}
          // Universe
          if(nt===11){for(let k=0;k<balls.length;k++){if(!balls[k].mg){addP(balls[k].x,balls[k].y,'#fff',12,5);balls[k].mg=true}}
            score+=50000;shake=25;addF(W/2,H/3,'✨ UNIVERSE! +50,000 ✨','#fff',28);
            addP(mx,my,'#ff0',50,8);addP(mx,my,'#f0f',50,8);addP(mx,my,'#0ff',50,8);coins+=100;sndWin()}
        }
        updHUD();updStarBar();
        // Check tier goal
        if(lvType==='tier'&&hiTier>=lvTarget&&state==='play'){state='complete';setTimeout(completeLevel,800)}
        break;
      }
    }
  }
  balls=balls.filter(b=>!b.mg);
  if(chainT>0)chainT--;else{if(chainN>maxChain)maxChain=chainN;chainN=0}
}

// === DANGER / CLUTCH ===
function checkDanger(){
  let dy=bT+(bB-bT)*.15,mx=0;
  for(let b of balls){if(b.y-b.r<dy){let d=1-(b.y-b.r-bT)/(dy-bT);if(d>mx)mx=d}}
  prevDanger=danger;danger=mx;
  if(danger>.7&&!clutch&&clutchCD<=0)clutch=true;
  if(danger<.3)clutch=false;if(clutchCD>0)clutchCD--;
  if(prevDanger>.8&&danger<.35){sndClutch();shake=8;
    let ch=document.createElement('div');ch.style.cssText='position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:900;color:#ffdd00;z-index:30;pointer-events:none;text-shadow:0 0 30px #ffaa00';
    ch.textContent='CLUTCH!';document.body.appendChild(ch);setTimeout(()=>{ch.style.opacity='0';ch.style.transition='opacity .5s'},100);setTimeout(()=>ch.remove(),800);
    score+=300;coins+=5;updHUD();updStarBar();clutchCD=300}
  if(danger>.9){slowMo=.5;slowMoT=90}else if(slowMoT>0){slowMoT--;if(slowMoT<=0)slowMo=1}
  let dl=document.getElementById('dgl'),dr=document.getElementById('dgr');
  if(danger>.3){dl.style.opacity='1';dr.style.opacity='1';dl.style.background=dr.style.background=danger>.7?'#ff0000':'#ff6600'}
  else{dl.style.opacity='0';dr.style.opacity='0'}
  // Overflow = fail (instant, no settle timer for fast pace)
  for(let b of balls){if(b.y-b.r<=bT+5&&Math.abs(b.vy)<.8){b.sc2=(b.sc2||0)+1;if(b.sc2>60){failLevel('Board overflow!');return}}else b.sc2=0}
}
// === SPAWN + DROP ===
function getSpawn(){
  let mxT=getLvl(curLv).maxS;
  if(clutch){let top={};let dy2=bT+(bB-bT)*.3;
    for(let b of balls)if(b.y<dy2)top[b.tier]=(top[b.tier]||0)+1;
    let bt=-1,bc=0;for(let t in top)if(top[t]>bc&&parseInt(t)<=mxT){bc=top[t];bt=parseInt(t)}
    if(bt>=0&&Math.random()<.28)return bt}
  if(lvMods.specials&&Math.random()<.06)return-1;
  return Math.floor(Math.random()*(mxT+1));
}

function dropBall(){
  if(state!=='play'||dropCD>0||lvDrops<=0)return;ia();
  lvDrops--;dropsUsed++;
  let tier=getSpawn();
  if(tier===-1){
    let b=mkB(dropX,bT+15,0);b.spec='bomb';b.c='#ff3333';b.gl='#ff6666';b.r=Math.max(6,20*(W/360));b.vy=1;balls.push(b);
    setTimeout(()=>{if(b&&!b.mg){sndBoom();shake=15;addSW(b.x,b.y,8);addP(b.x,b.y,'#f44',35,6);
      for(let o of balls){let dx=o.x-b.x,dy=o.y-b.y;if(Math.sqrt(dx*dx+dy*dy)<80*(W/360)&&o!==b){o.mg=true;score+=T[o.tier].pt;addP(o.x,o.y,o.c,4,3)}}
      b.mg=true;balls=balls.filter(x=>!x.mg);updHUD();updStarBar()}},1300);
  }else{let t=T[tier],r=Math.max(4,t.r*(W/360));let b=mkB(dropX,bT+r+5,tier);b.vy=1;b.vx=(Math.random()-.5)*.4;balls.push(b)}
  sndDrop();curT=nxtT;nxtT=getSpawn();if(nxtT<0)nxtT=0;updNext();
  dropCD=16;state='drop';setTimeout(()=>{
    if(state==='drop'){
      state='play';
      // Check if out of drops and board settled
      if(lvDrops<=0)setTimeout(()=>checkEndOfDrops(),800);
    }
  },280);
}

function checkEndOfDrops(){
  if(state==='complete'||state==='fail')return;
  if(state!=='play'&&state!=='drop')return;
  // Wait for physics to settle
  let moving=balls.some(b=>Math.abs(b.vy)>0.5||Math.abs(b.vx)>0.5);
  if(moving){setTimeout(checkEndOfDrops,500);return}
  // Check if goal met
  if(lvType==='score'&&score>=lvTarget){state='complete';setTimeout(completeLevel,500)}
  else if(lvType==='tier'&&hiTier>=lvTarget){state='complete';setTimeout(completeLevel,500)}
  else{
    let pct=lvType==='score'?Math.floor(score/lvTarget*100):Math.floor(hiTier/lvTarget*100);
    failLevel('Ran out of drops! ('+pct+'% done)');
  }
}

// === HUD ===
function updHUD(){
  document.getElementById('drops-left').textContent=lvDrops;
  document.getElementById('drops-left').style.color=lvDrops<=3?'#ff4444':'#44ddff';
  document.getElementById('score-val').textContent=score.toLocaleString();
  document.getElementById('target-val').textContent=lvType==='score'?'Target: '+lvTarget.toLocaleString():lvType==='tier'?'Goal: '+T[Math.min(lvTarget,11)].n:'';
}
function updNext(){let t=T[nxtT];document.getElementById('next-orb').innerHTML='<span style="color:'+t.c+'">●</span>'}
function updStarBar(){
  let pct=0,s=score;
  if(s>=lvStar3)pct=100;else if(s>=lvStar2)pct=66+34*(s-lvStar2)/(lvStar3-lvStar2);
  else if(s>=lvStar1)pct=33+33*(s-lvStar1)/(lvStar2-lvStar1);
  else pct=33*s/Math.max(1,lvStar1);
  document.getElementById('star-fill').style.width=Math.min(100,pct)+'%';
  // Star marks
  let track=document.getElementById('star-track');
  if(!track.querySelector('.star-mark')&&track){
    [33,66,100].forEach((p,i)=>{let m=document.createElement('span');m.className='star-mark';m.id='sm'+i;m.textContent='⭐';m.style.left=p+'%';track.appendChild(m)});
  }
  for(let i=0;i<3;i++){
    let el=document.getElementById('sm'+i);
    let thresh=[lvStar1,lvStar2,lvStar3][i];
    el.classList.toggle('lit',s>=thresh);
    if(s>=thresh&&!el.dataset.done){el.dataset.done='1';sndStar();shake=Math.max(shake,4)}
  }
}

// === COMPLETE / FAIL ===
function completeLevel(){
  state='complete';sndWin();
  let stars=0;
  if(score>=lvStar3)stars=3;else if(score>=lvStar2)stars=2;else if(score>=lvStar1)stars=1;
  let prev=starsEarned[curLv]||0;
  if(stars>prev)starsEarned[curLv]=stars;
  if(curLv>=maxUnlocked)maxUnlocked=curLv+1;
  let coinReward=stars*15+curLv*3;coins+=coinReward;
  save();
  document.getElementById('c-title').textContent=stars===3?'PERFECT! 🌟':'COMPLETE!';
  document.getElementById('c-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('c-score').textContent='Score: '+score.toLocaleString();
  document.getElementById('c-best').textContent='Drops used: '+dropsUsed+'/'+lvMaxDrops+' | Best combo: x'+bestCombo;
  document.getElementById('c-coins').textContent='+'+coinReward+' 🪙';
  document.getElementById('c-new').textContent=stars>prev?'⬆ NEW BEST!':'';
  document.getElementById('c-next-btn').style.display=curLv<50?'inline-block':'none';
  document.getElementById('complete').classList.add('on');
}

function failLevel(reason){
  if(state==='fail'||state==='complete')return;
  state='fail';sndFail();
  let pct=lvType==='score'?Math.floor(score/lvTarget*100):0;
  document.getElementById('f-reason').textContent=reason;
  document.getElementById('f-almost').textContent=pct>70?'SO CLOSE! You were at '+pct+'%!':pct>40?'Getting there... '+pct+'%':'Keep trying!';
  document.getElementById('fail').classList.add('on');
}

function retryLevel(){document.getElementById('complete').classList.remove('on');document.getElementById('fail').classList.remove('on');showIntro()}
function goNext(){document.getElementById('complete').classList.remove('on');curLv++;if(curLv>50)curLv=50;showIntro()}
function goMap(){document.getElementById('complete').classList.remove('on');document.getElementById('fail').classList.remove('on');document.getElementById('menu').style.display='flex';buildMap();state='map'}
// === DRAWING ===
function drawBG(){
  let gr=X.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#0b0b24');gr.addColorStop(.5,'#100730');gr.addColorStop(1,'#0b0b24');
  X.fillStyle=gr;X.fillRect(0,0,W,H);
  X.fillStyle='rgba(255,255,255,.15)';
  for(let i=0;i<20;i++){let sx=((i*137+fr*.06)%W),sy=((i*251+fr*.03)%H);
    let sr=Math.max(.2,.3+Math.sin(fr*.01+i)*.15);X.beginPath();X.arc(sx,sy,sr,0,6.28);X.fill()}
  let wc=danger>.7?'rgba(255,40,40,.4)':'rgba(30,30,80,.8)';
  X.fillStyle=wc;X.fillRect(0,bT,WALL,bB-bT);X.fillRect(W-WALL,bT,WALL,bB-bT);X.fillRect(0,bB,W,WALL);
  X.strokeStyle='rgba(255,255,255,.02)';X.lineWidth=1;
  for(let i=1;i<COLS;i++){let x=bL+i*cW;X.beginPath();X.moveTo(x,bT);X.lineTo(x,bB);X.stroke()}
  let dy=bT+(bB-bT)*.15,da=danger>.5?.2:.06;
  X.strokeStyle='rgba(255,0,0,'+da+')';X.setLineDash([4,4]);X.beginPath();X.moveTo(bL,dy);X.lineTo(bR,dy);X.stroke();X.setLineDash([]);
  for(let o of obstacles){
    X.fillStyle=o.type==='ice'?'rgba(100,200,255,.4)':o.type==='stone'?'rgba(140,140,140,.5)':'rgba(80,0,120,.45)';
    X.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h);
    X.fillStyle='rgba(255,255,255,.2)';let mh=o.type==='ice'?2:3;X.fillRect(o.x-o.w/2,o.y+o.h/2-3,o.w*(o.hp/mh),3);
  }
}

function drawBall(b){
  X.save();X.translate(b.x,b.y);
  let bs=1;if(Math.abs(b.vy)<.5&&Math.abs(b.vx)<.5){b.bp+=.03;bs=1+Math.sin(b.bp)*.01}
  X.scale(b.sq*bs,b.st*bs);
  for(let t of b.tr){X.globalAlpha=t.l*.2;X.fillStyle=b.c;X.beginPath();X.arc(t.x-b.x,t.y-b.y,Math.max(1,b.r*.4),0,6.28);X.fill()}
  X.globalAlpha=1;
  let gg=X.createRadialGradient(0,0,b.r*.2,0,0,Math.max(2,b.r*1.7));
  gg.addColorStop(0,b.gl+'44');gg.addColorStop(1,'transparent');
  X.fillStyle=gg;X.beginPath();X.arc(0,0,Math.max(2,b.r*1.7),0,6.28);X.fill();
  let mg=X.createRadialGradient(-b.r*.3,-b.r*.3,b.r*.1,0,0,Math.max(2,b.r));
  mg.addColorStop(0,'#fff');mg.addColorStop(.3,b.c);mg.addColorStop(1,b.gl+'88');
  X.fillStyle=mg;X.beginPath();X.arc(0,0,Math.max(2,b.r),0,6.28);X.fill();
  X.fillStyle='rgba(255,255,255,.3)';X.beginPath();X.arc(-b.r*.2,-b.r*.2,Math.max(1,b.r*.22),0,6.28);X.fill();
  if(b.spec==='bomb'){X.fillStyle='#fff';X.font=(Math.max(8,b.r*.6))+'px Arial';X.textAlign='center';X.textBaseline='middle';X.fillText('💣',0,1)}
  else if(b.tier>=4){X.fillStyle='rgba(0,0,0,.4)';X.font='bold '+Math.max(6,b.r*.4)+'px Arial';X.textAlign='center';X.textBaseline='middle';X.fillText(T[b.tier].n.substr(0,3),0,1)}
  X.restore();
}

function drawPreview(){
  if(state!=='play'||lvDrops<=0)return;
  let t=T[curT],r=Math.max(4,t.r*(W/360));
  X.strokeStyle='rgba(255,255,255,.08)';X.setLineDash([3,3]);
  X.beginPath();X.moveTo(dropX,bT+r);X.lineTo(dropX,bB);X.stroke();X.setLineDash([]);
  X.globalAlpha=.4;
  drawBall({x:dropX,y:bT+r+5,r,tier:curT,c:t.c,gl:t.g,sq:1,st:1,bp:0,tr:[],vx:0,vy:0,spec:null});
  X.globalAlpha=1;
}

function drawSW(){for(let s of sws){let a=Math.max(0,Math.floor(s.l*50));
  X.strokeStyle=s.c+a.toString(16).padStart(2,'0');X.lineWidth=2;X.beginPath();X.arc(s.x,s.y,Math.max(1,s.r),0,6.28);X.stroke()}X.lineWidth=1}
function drawPts(){for(let p of pts){X.globalAlpha=p.l;X.fillStyle=p.c;let r=Math.max(.2,p.r*p.l);X.beginPath();X.arc(p.x,p.y,r,0,6.28);X.fill()}X.globalAlpha=1}
function drawFts(){for(let f of fts){X.globalAlpha=f.l;X.fillStyle=f.c;X.font='bold '+f.sz+'px Arial';X.textAlign='center';X.fillText(f.t,f.x,f.y)}X.globalAlpha=1}

// === UPDATES ===
function updPts(){for(let p of pts){p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.l-=p.d}pts=pts.filter(p=>p.l>0);
  for(let f of fts){f.y+=f.vy;f.l-=.014}fts=fts.filter(f=>f.l>0)}
function updCombo(){if(comboT>0){comboT-=16.67;if(comboT<=0)combo=0}}
function updShake(){if(shake>0){shX=(Math.random()-.5)*shake;shY=(Math.random()-.5)*shake;shake*=.88;if(shake<.4){shake=0;shX=0;shY=0}}}
function updQuake(){
  if(lvMods.quake&&dropsUsed%8===0&&dropsUsed>0&&dropCD===14){
    shake=10;for(let b of balls){b.vx+=(Math.random()-.5)*3;b.vy-=1+Math.random()*2}
    addF(W/2,H/2,'QUAKE!','#ff8844',24)}}

// === INPUT ===
let pd=false;
C.addEventListener('pointerdown',e=>{e.preventDefault();if(state==='play'||state==='drop'){pd=true;
  let r=C.getBoundingClientRect(),sx=C.width/r.width;dropX=Math.max(bL+15,Math.min(bR-15,(e.clientX-r.left)*sx))}});
C.addEventListener('pointermove',e=>{e.preventDefault();if(pd&&(state==='play'||state==='drop')){
  let r=C.getBoundingClientRect(),sx=C.width/r.width;dropX=Math.max(bL+15,Math.min(bR-15,(e.clientX-r.left)*sx))}});
C.addEventListener('pointerup',e=>{e.preventDefault();if(pd){pd=false;dropBall()}});

// === MAIN LOOP ===
function loop(){
  fr++;
  if(state==='play'||state==='drop'){
    physics();checkMerge();checkDanger();updSW();updCombo();updPts();updShake();updQuake();
    if(dropCD>0)dropCD--;if(state==='drop'&&dropCD<=0)state='play';
    if(lvDrops<=0&&state==='play'&&fr%30===0){let mv=balls.some(b=>Math.abs(b.vy)>0.3||Math.abs(b.vx)>0.3);if(!mv)checkEndOfDrops();}
  }
  if(state!=='map'){
    X.save();X.translate(shX,shY);
    drawBG();for(let b of balls)drawBall(b);drawPreview();drawSW();drawPts();drawFts();
    X.restore();
    if(slowMo<1){X.fillStyle='rgba(0,0,0,'+(0.2*(1-slowMo)*2)+')';X.fillRect(0,0,W,H*.1);X.fillRect(0,H*.9,W,H*.1)}
  }
  requestAnimationFrame(loop);
}

// === BOOT ===
addEventListener('resize',resize);
resize();load();buildMap();
requestAnimationFrame(loop);
</script></body></html>
